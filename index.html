/* =========================================================
   GITHUB / FETCH LAYER
   ========================================================= */
async function fetchJSON(url) {
  const r = await fetch(url, { headers: { 'Accept': 'application/vnd.github+json' } });
  if (!r.ok) throw new Error(`${r.status} ${url}`);
  return r.json();
}
async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} ${url}`);
  return r.text();
}

/**
 * Discover the tree of trips and versions.
 *
 * Modes:
 *   - GitHub mode: query git/trees API, then fall back to Contents API.
 *   - Local mode: read trips/index.json (a manifest auto-generated by
 *     scripts/build-manifest.js or scripts/redact.js). This works on any
 *     host that serves the deployed files (Cloudflare Pages, custom
 *     domain, file://, anything).
 */
async function loadTree() {
  // ---- Local mode: read manifest from the deployed site itself ----
  if (CONFIG.localMode) {
    try {
      const manifest = await fetchJSON(`${CONFIG.tripsDir}/index.json`);
      if (Array.isArray(manifest) && manifest.length) {
        return manifest.map(t => ({
          trip: t.trip,
          versions: (t.versions || []).sort(),
        })).sort((a, b) => a.trip.localeCompare(b.trip));
      }
    } catch (e) {
      console.warn(`Local manifest ${CONFIG.tripsDir}/index.json not found.  ` +
                   `Run scripts/build-manifest.js or scripts/redact.js to generate it.`, e);
      return null;
    }
    return null;
  }

  // ---- GitHub mode ----
  try {
    const tree = await fetchJSON(`${API_BASE}/git/trees/${CONFIG.branch}?recursive=1`);
    if (tree.tree) {
      const map = new Map();
      for (const node of tree.tree) {
        if (node.type !== 'blob') continue;
        if (!node.path.startsWith(CONFIG.tripsDir + '/')) continue;
        if (!node.path.endsWith('.md')) continue;
        const rel = node.path.slice((CONFIG.tripsDir + '/').length);
        const parts = rel.split('/');
        if (parts.length !== 2) continue;
        const trip = parts[0];
        const version = parts[1].replace(/\.md$/, '');
        if (!map.has(trip)) map.set(trip, []);
        map.get(trip).push(version);
      }
      const list = [...map.entries()].map(([trip, versions]) => ({
        trip, versions: versions.sort()
      })).sort((a, b) => a.trip.localeCompare(b.trip));
      if (list.length) return list;
    }
  } catch (e) {
    console.warn('git tree API failed, trying contents API:', e);
  }

  try {
    const trips = await fetchJSON(`${API_BASE}/contents/${CONFIG.tripsDir}`);
    const list = [];
    for (const t of trips) {
      if (t.type !== 'dir') continue;
      const versions = await fetchJSON(`${API_BASE}/contents/${CONFIG.tripsDir}/${t.name}`);
      list.push({
        trip: t.name,
        versions: versions
          .filter(v => v.type === 'file' && v.name.endsWith('.md'))
          .map(v => v.name.replace(/\.md$/, ''))
          .sort()
      });
    }
    return list.sort((a, b) => a.trip.localeCompare(b.trip));
  } catch (e) {
    console.warn('contents API failed:', e);
    if (CONFIG.fallbackToLocal) return null;
    throw e;
  }
}

async function loadTripMd(trip, version) {
  // Local mode: read directly from the deployed trips/ folder.
  if (CONFIG.localMode) {
    return await fetchText(`${CONFIG.tripsDir}/${trip}/${version}.md`);
  }
  // GitHub mode: try raw.githubusercontent first, fall back to local path.
  const urls = [
    `${RAW_BASE}/${CONFIG.tripsDir}/${trip}/${version}.md`,
    `${CONFIG.tripsDir}/${trip}/${version}.md`,
  ];
  let lastErr;
  for (const u of urls) {
    try { return await fetchText(u); }
    catch (e) { lastErr = e; }
  }
  throw lastErr;
}

/* =========================================================
   MARKDOWN PARSER (custom for our schema)
   ========================================================= */
function parseTrip(md) {
  // 1) Frontmatter
  let body = md;
  let fm = {};
  const fmMatch = md.match(/^---\s*\n([\s\S]+?)\n---\s*\n?/);
  if (fmMatch) {
    try { fm = jsyaml.load(fmMatch[1]) || {}; } catch (e) { console.warn('frontmatter parse:', e); }
    body = md.slice(fmMatch[0].length);
  }

  // 2) Split into ## sections
  const lines = body.split('\n');
  const sections = []; // {name, body, isItinerary}
  let curSection = null;
  for (const ln of lines) {
    const m = ln.match(/^##\s+(.+?)\s*$/);
    if (m && !ln.startsWith('###')) {
      curSection = { name: m[1].trim(), body: '' };
      sections.push(curSection);
    } else if (curSection) {
      curSection.body += ln + '\n';
    }
  }

  // 3) Parse each section
  for (const sec of sections) {
    if (sec.name === '行程') {
      sec.isItinerary = true;
      sec.days = parseItinerary(sec.body, fm);
    } else if (sec.name === '備案' || sec.name === '語言' || /備案|附錄|語言/.test(sec.name)) {
      sec.isFreeform = true;
      sec.html = marked.parse(sec.body);
    } else {
      sec.items = parseItems(sec.body);
    }
  }

  return { fm, sections };
}

/** Parse item-form sections (### Item Name + - **key**: value list) */
function parseItems(body) {
  const items = [];
  const parts = body.split(/^###\s+/m).slice(1);
  for (const part of parts) {
    const lines = part.split('\n');
    const name = lines.shift().trim();
    const item = { name, fields: {}, image: null, images: [], description: '' };
    let i = 0;
    // Read leading field lines (- **key**: value)
    while (i < lines.length) {
      const ln = lines[i];
      const fm = ln.match(/^-\s+\*\*([^*]+)\*\*\s*[:：]\s*(.*)$/);
      if (fm) {
        item.fields[fm[1].trim()] = fm[2].trim();
        i++;
      } else if (ln.trim() === '') {
        i++;
      } else {
        break;
      }
    }
    // Remainder = images + description
    const rest = lines.slice(i).join('\n');
    // Pull out images at top
    const imgRe = /^\s*!\[([^\]]*)\]\(([^)]+)\)\s*$/gm;
    let im;
    let descBody = rest;
    while ((im = imgRe.exec(rest)) !== null) {
      const url = im[2].trim();
      item.images.push(url);
      if (!item.image) item.image = url;
    }
    // Strip leading images from description
    descBody = descBody.replace(/^(\s*!\[[^\]]*\]\([^)]+\)\s*\n?)+/, '');
    item.description = descBody.trim();
    item.descriptionHTML = marked.parse(item.description || '');
    items.push(item);
  }
  return items;
}

/** Parse the itinerary section into days with stops */
function parseItinerary(body, fm) {
  const startDate = parseDate(fm.start_date);
  const days = [];
  const dayParts = body.split(/^###\s+Day\s+\d+\s*[—–-]\s*(\d{4}-\d{2}-\d{2})\s*$/m);
  // dayParts: [pre, date1, body1, date2, body2, ...]
  for (let i = 1; i < dayParts.length; i += 2) {
    const date = parseDate(dayParts[i]);
    const dayBody = dayParts[i + 1] || '';
    const stops = parseStops(dayBody);
    const dayNumber = startDate ? daysBetween(startDate, date) + 1 : days.length + 1;
    days.push({ dayNumber, date, stops });
  }
  days.sort((a, b) => (a.date - b.date));
  // Re-number based on sorted date order if start_date is missing
  if (!startDate) days.forEach((d, idx) => d.dayNumber = idx + 1);
  return days;
}

function parseStops(body) {
  const stops = [];
  const parts = body.split(/^####\s+/m).slice(1);
  for (const part of parts) {
    const lines = part.split('\n');
    const head = (lines.shift() || '').trim();
    // Try: "HH:MM[–-~]HH:MM Place" or "HH:MM– Place" or just "Place"
    const tm = head.match(/^(\d{1,2}:\d{2})\s*[–\-~]+\s*(\d{1,2}:\d{2})?\s*(.+)?$/);
    let timeStart = null, timeEnd = null, name = head;
    if (tm) {
      timeStart = tm[1] || null;
      timeEnd = tm[2] || null;
      name = (tm[3] || '').trim() || head;
    }
    const stop = { name, timeStart, timeEnd, fields: {} };
    let i = 0;
    while (i < lines.length) {
      const ln = lines[i];
      const m = ln.match(/^-\s+\*\*([^*]+)\*\*\s*[:：]\s*(.*)$/);
      if (m) { stop.fields[m[1].trim()] = m[2].trim(); i++; }
      else if (ln.trim() === '') i++;
      else break;
    }
    stops.push(stop);
  }
  return stops;
}

/* =========================================================
   RESOLVE STOP REFS  (e.g. "住宿:Hotel Gracery Shinjuku")
   ========================================================= */
function findItemByRef(parsed, ref) {
  if (!ref) return null;
  const m = ref.match(/^([^:：]+)[:：]\s*(.+)$/);
  if (!m) return null;
  const sectionName = m[1].trim();
  const itemName = m[2].trim();
  for (const sec of parsed.sections) {
    if (sec.name !== sectionName) continue;
    if (!sec.items) continue;
    return { section: sec, item: sec.items.find(it => it.name === itemName) || null };
  }
  return null;
}

/* =========================================================
   RENDER
   ========================================================= */
function render() {
  const root = $('#app');
  const p = state.parsed;
  if (!p) return;

  // Determine tabs: 行程 first if exists, then everything else in author order
  const tabs = [...p.sections];

  // Default tab
  if (!state.currentTab || !tabs.find(t => t.name === state.currentTab)) {
    state.currentTab = tabs.length ? tabs[0].name : null;
  }

  root.innerHTML = `
    ${renderDashboard(p)}
    ${renderTabsBar(tabs)}
    <div class="tab-content" id="tab-content"></div>
  `;
  renderTabContent();
  initOverviewMap();
}

function renderDashboard(p) {
  const fm = p.fm;
  const start = parseDate(fm.start_date);
  const end = parseDate(fm.end_date);
  const today = new Date(); today.setHours(0,0,0,0);

  // countdown
  let countdownHTML;
  if (start) {
    const days = daysBetween(today, start);
    if (days > 0) {
      countdownHTML = `<div class="dash-value">${days}<span class="unit">天</span></div><div class="dash-sub">出發倒數</div>`;
    } else if (start && end && today <= end) {
      countdownHTML = `<div class="dash-value">旅行中</div><div class="dash-sub">${fmtDate(start)} – ${fmtDate(end)}</div>`;
    } else {
      countdownHTML = `<div class="dash-value">已歸來</div><div class="dash-sub">${fmtDate(start)} – ${fmtDate(end)}</div>`;
    }
  } else {
    countdownHTML = `<div class="dash-value">—</div><div class="dash-sub">未設定日期</div>`;
  }

  // pacing — count stops by category in itinerary
  const itinerary = p.sections.find(s => s.isItinerary);
  let pacingHTML = `<div class="dash-sub">尚無行程資料</div>`;
  if (itinerary && itinerary.days.length) {
    const counts = { '景點': 0, '餐廳': 0, '住宿': 0, '交通': 0, '其他': 0 };
    for (const d of itinerary.days) {
      for (const s of d.stops) {
        const ref = s.fields.ref;
        const m = ref && ref.match(/^([^:：]+)[:：]/);
        const cat = m ? m[1].trim() : '其他';
        if (counts[cat] !== undefined) counts[cat]++;
        else counts['其他']++;
      }
    }
    const total = Object.values(counts).reduce((a, b) => a + b, 0) || 1;
    pacingHTML = `<div class="pacing-bars">` +
      Object.entries(counts).filter(([_, n]) => n > 0).map(([k, n]) => {
        const pct = Math.round(n / total * 100);
        return `<div class="pacing-bar-row"><span class="pacing-name">${k}</span><span class="pacing-track"><span class="pacing-fill" style="width:${pct}%"></span></span><span class="pacing-pct">${pct}%</span></div>`;
      }).join('') + `</div>`;
  }

  // hero
  const cover = fm.cover ? resolveImage(fm.cover) : null;
  const tripName = fm.trip || state.currentTrip;
  const sub = fm.summary || '';
  const tags = (fm.tags || []).map(t => `<span class="tag-chip">${escHTML(t)}</span>`).join('');
  const dateStr = start && end ? `${fmtDate(start)} – ${fmtDate(end)}` : (fm.travelers || '');
  const travelersStr = fm.travelers ? ` · ${escHTML(fm.travelers)}` : '';

  const hero = cover ? `
    <div class="dashboard-cover">
      <img src="${escHTML(cover)}" alt="${escHTML(tripName)}" onerror="this.style.display='none'"/>
      <div class="dashboard-cover-overlay">
        <div class="trip-meta">${escHTML(dateStr)}${travelersStr}</div>
        <h1>${escHTML(tripName)}</h1>
        ${sub ? `<div class="summary">${escHTML(sub)}</div>` : ''}
        ${tags ? `<div class="tags">${tags}</div>` : ''}
      </div>
    </div>
  ` : `
    <div class="dashboard-headline">
      <div class="trip-meta">${escHTML(dateStr)}${travelersStr}</div>
      <h1>${escHTML(tripName)}</h1>
      ${sub ? `<div class="summary">${escHTML(sub)}</div>` : ''}
      ${tags ? `<div class="tags">${tags}</div>` : ''}
    </div>
  `;

  return `
    <section class="dashboard">
      ${hero}
      <div class="dashboard-grid">
        <div class="dash-card">
          <div class="dash-label">Countdown</div>
          ${countdownHTML}
        </div>
        <div class="dash-card">
          <div class="dash-label">Pacing</div>
          ${pacingHTML}
        </div>
        <div class="dash-card dash-map">
          <div id="overview-map"></div>
        </div>
      </div>
    </section>
  `;
}

function renderTabsBar(tabs) {
  return `<nav class="tabs-bar">${tabs.map(t => {
    const cnt = t.isItinerary ? (t.days || []).length : (t.items ? t.items.length : null);
    const cntHTML = (cnt !== null && cnt > 0) ? `<span class="tab-count">${cnt}</span>` : '';
    return `<button class="tab-btn ${t.name === state.currentTab ? 'active' : ''}" data-tab="${escHTML(t.name)}">${escHTML(t.name)}${cntHTML}</button>`;
  }).join('')}</nav>`;
}

function renderTabContent() {
  const wrap = $('#tab-content');
  if (!wrap) return;
  const sec = state.parsed.sections.find(s => s.name === state.currentTab);
  if (!sec) { wrap.innerHTML = ''; return; }
  // Cleanup previous day maps
  state.dayMaps.forEach(m => m.remove());
  state.dayMaps.clear();

  if (sec.isItinerary) {
    renderItinerary(sec, wrap);
  } else if (sec.isFreeform) {
    wrap.innerHTML = `<div class="freeform-content">${sec.html}</div>`;
  } else if (sec.name === '交通' && sec.items) {
    wrap.innerHTML = renderTransitGrouped(sec.items);
    bindCardClicks();
  } else if (sec.items) {
    wrap.innerHTML = `<div class="cards-grid">${sec.items.map(it => renderCard(it, sec.name)).join('')}</div>`;
    bindCardClicks();
  } else {
    wrap.innerHTML = '';
  }
}

const TRANSIT_GROUPS = {
  flight:         { icon: '✈️',  label: '飛機' },
  train:          { icon: '🚄',  label: '火車' },
  bus:            { icon: '🚌',  label: '客運 / 巴士' },
  public_transit: { icon: '🚇',  label: '大眾運輸' },
  taxi:           { icon: '🚕',  label: '計程車' },
  car:            { icon: '🚗',  label: '租車' },
  ferry:          { icon: '🚢',  label: '渡輪' },
};
function renderTransitGrouped(items) {
  const groups = new Map();
  for (const it of items) {
    const mode = (it.fields.mode || '').toLowerCase().replace(/[\s-]/g, '_') || 'other';
    if (!groups.has(mode)) groups.set(mode, []);
    groups.get(mode).push(it);
  }
  const order = ['flight','train','bus','public_transit','taxi','car','ferry','other'];
  const sortedKeys = [...groups.keys()].sort((a, b) => {
    const ai = order.indexOf(a), bi = order.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  return sortedKeys.map(mode => {
    const meta = TRANSIT_GROUPS[mode] || { icon: '•', label: '其他' };
    const its = groups.get(mode);
    const renderer = (mode === 'flight') ? renderFlightCard : (it => renderCard(it, '交通'));
    return `<div class="transit-section">
      <h3>${meta.icon} ${meta.label}</h3>
      <div class="cards-grid">${its.map(renderer).join('')}</div>
    </div>`;
  }).join('');
}

/** Boarding-pass style card for flight items in the 交通 tab. */
function renderFlightCard(item) {
  const info = parseFlightInfo(item);
  if (!info) return renderCard(item, '交通'); // fallback to generic card
  const f = item.fields;
  const fromIATA = info.fromCode || '???';
  const toIATA   = info.toCode   || '???';
  const fromCity = info.fromCity || '';
  const toCity   = info.toCity   || '';
  const depTime  = info.departTime || '';
  const arrTime  = info.arriveTime || '';
  const nextDay  = info.crossesDate ? '<span class="next-day-mark">+1</span>' : '';
  const dateLabel = info.departDate || '';
  const tag = f.tag || '';
  const notes = f.notes || '';
  const airline = info.airline || '';
  const flightNo = info.flightNo || '';
  return `
    <article class="card flight-card" data-section="交通" data-item="${escHTML(item.name)}">
      <div class="flight-card-header">
        <span class="flight-airline-name">${escHTML(airline)}</span>
        <span class="flight-no">${escHTML(flightNo)}</span>
      </div>
      <div class="flight-route-row">
        <div class="flight-endpoint">
          <div class="iata">${escHTML(fromIATA)}</div>
          <div class="city">${escHTML(fromCity)}</div>
          <div class="time">${escHTML(depTime)}</div>
        </div>
        <div class="flight-path">
          <div class="path-line"></div>
          <div class="path-icon">✈</div>
        </div>
        <div class="flight-endpoint">
          <div class="iata">${escHTML(toIATA)}</div>
          <div class="city">${escHTML(toCity)}</div>
          <div class="time">${escHTML(arrTime)}${nextDay}</div>
        </div>
      </div>
      <div class="flight-card-footer">
        <span>${escHTML(dateLabel)}</span>
        ${tag ? `<span class="flight-tag">${escHTML(tag)}</span>` : ''}
        ${notes ? `<span class="flight-notes">${escHTML(notes)}</span>` : ''}
      </div>
    </article>
  `;
}

/* ----- Card ----- */
function renderCard(item, sectionName) {
  const f = item.fields;
  const tag = f.tag || f.type || null;
  const subtitle = buildCardSubtitle(item, sectionName);
  const meta = buildCardMeta(item, sectionName);
  const notes = f.notes || '';
  const imageUrl = item.image ? resolveImage(item.image) : null;

  return `
    <article class="card" data-section="${escHTML(sectionName)}" data-item="${escHTML(item.name)}">
      <div class="card-image ${!imageUrl ? 'card-image-placeholder' : ''}">
        ${imageUrl ? `<img src="${escHTML(imageUrl)}" alt="${escHTML(item.name)}" loading="lazy" onerror="window.__handleCardImageError(this)"/>` : ''}
        ${tag ? `<div class="card-tag">${escHTML(tag)}</div>` : ''}
        ${!imageUrl ? `<span>無圖片</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${escHTML(item.name)}</div>
        ${subtitle ? `<div class="card-subtitle">${subtitle}</div>` : ''}
        ${meta ? `<div class="card-meta">${meta}</div>` : ''}
        ${notes ? `<div class="card-notes">${escHTML(notes)}</div>` : ''}
      </div>
    </article>
  `;
}

function buildCardSubtitle(item, sectionName) {
  const f = item.fields;
  if (sectionName === '住宿') {
    const dates = (f.check_in || f.check_out) ? `${f.check_in || ''} – ${f.check_out || ''}` : '';
    return [dates, f.address].filter(Boolean).map(escHTML).join(' · ');
  }
  if (sectionName === '餐廳') {
    return [f.recommended].filter(Boolean).map(escHTML).join(' · ');
  }
  if (sectionName === '景點') {
    return [f.duration && `${f.duration}`, f.ticket].filter(Boolean).map(escHTML).join(' · ');
  }
  if (sectionName === '交通') {
    return [f.depart && `▷ ${f.depart}`, f.arrive && `◁ ${f.arrive}`, f.airline || f.operator].filter(Boolean).map(escHTML).join(' · ');
  }
  if (sectionName === '票券') {
    return [f.valid && `Valid: ${f.valid}`].filter(Boolean).map(escHTML).join(' · ');
  }
  if (sectionName === '醫療') {
    return [f.address || f.phone].filter(Boolean).map(escHTML).join(' · ');
  }
  return '';
}
function buildCardMeta(item, sectionName) {
  const f = item.fields;
  const out = [];
  if (f.price) out.push(`<span class="card-meta-item">💴 ${escHTML(f.price)}</span>`);
  if (f.price_range) out.push(`<span class="card-meta-item">${escHTML(f.price_range)}</span>`);
  if (f.duration) out.push(`<span class="card-meta-item">⏱ ${escHTML(f.duration)}</span>`);
  if (f.phone) out.push(`<span class="card-meta-item">☏ ${escHTML(f.phone)}</span>`);
  if (f.dietary) out.push(`<span class="card-meta-item">🥗 ${escHTML(f.dietary)}</span>`);
  return out.join('');
}

function bindCardClicks() {
  $$('.card').forEach(card => {
    card.addEventListener('click', () => {
      const section = card.dataset.section;
      const item = card.dataset.item;
      openItemModal(section, item);
    });
  });
}

/* ----- Day timeline ----- */

const VIEW_MODE_KEY = 'tripsite.itineraryViewMode'; // 'tabs' | 'vertical'

/** Read the user's preferred view mode from localStorage. Default = tabs. */
function getViewMode() {
  try {
    const m = localStorage.getItem(VIEW_MODE_KEY);
    return m === 'vertical' ? 'vertical' : 'tabs';
  } catch (e) { return 'tabs'; }
}
function setViewMode(mode) {
  try { localStorage.setItem(VIEW_MODE_KEY, mode); } catch (e) {}
}

/**
 * Pick the day index to land on initially.
 *   - If today is within [start_date, end_date], pick that day.
 *   - Otherwise, default to day 0.
 * Falls back to 0 for any unparseable input.
 */
function pickInitialDayIdx(sec) {
  if (!sec.days || !sec.days.length) return 0;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  for (let i = 0; i < sec.days.length; i++) {
    const d = parseDate(sec.days[i].date);
    if (!d) continue;
    const dayStart = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    if (dayStart.getTime() === today.getTime()) return i;
  }
  return 0;
}

/** Top-level itinerary renderer — branches on the user's preferred view mode. */
function renderItinerary(sec, wrap) {
  if (!wrap) wrap = $('#tab-content');
  if (!wrap) return;
  // Defensive: if days array is missing/empty, render nothing useful but
  // don't throw. (This used to cause "blank itinerary tab" when a trip's
  // ## 行程 section had no parseable Day headers.)
  if (!sec.days || !sec.days.length) {
    wrap.innerHTML = '<div class="freeform-content"><em>此行程目前沒有可顯示的天數（請檢查 ## 行程 是否有 ### Day N — YYYY-MM-DD 格式的標題）。</em></div>';
    return;
  }
  const mode = getViewMode();
  // Build the toggle + container
  wrap.innerHTML = `
    <div class="itinerary-toolbar">
      <div class="view-toggle" role="tablist" aria-label="檢視模式">
        <button class="view-toggle-btn ${mode === 'tabs' ? 'active' : ''}" data-mode="tabs" type="button" title="橫向分頁">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="6" width="6" height="12" rx="1"/><rect x="11" y="6" width="6" height="12" rx="1" opacity="0.4"/><rect x="19" y="6" width="3" height="12" rx="1" opacity="0.2"/></svg>
          <span>分頁</span>
        </button>
        <button class="view-toggle-btn ${mode === 'vertical' ? 'active' : ''}" data-mode="vertical" type="button" title="垂直全部">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="5" rx="1"/><rect x="3" y="10" width="18" height="5" rx="1"/><rect x="3" y="17" width="18" height="5" rx="1"/></svg>
          <span>垂直</span>
        </button>
      </div>
    </div>
    <div id="itinerary-body"></div>
  `;
  $$('.view-toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const m = btn.dataset.mode;
      if (m === getViewMode()) return;
      setViewMode(m);
      renderItinerary(sec, wrap);
    });
  });
  try {
    if (mode === 'tabs') renderTabsMode(sec);
    else renderVerticalMode(sec);
  } catch (e) {
    console.error('Itinerary render error:', e);
    const body = $('#itinerary-body');
    if (body) {
      body.innerHTML = `<div class="freeform-content"><em>行程渲染失敗：${escHTML(String(e.message || e))}。請打開瀏覽器 console 看詳細錯誤。</em></div>`;
    }
  }
}

/** Tabs mode: horizontal day navigator + lazily-rendered active day. */
function renderTabsMode(sec) {
  const body = $('#itinerary-body');
  const tabs = sec.days.map((d, idx) => `
    <button class="day-tab" data-day-idx="${idx}" type="button">
      <span class="day-tab-num">D${d.dayNumber}</span>
      <span class="day-tab-date">${fmtDateShort(d.date)}<span class="day-tab-wd">${weekdayCN(d.date)}</span></span>
    </button>
  `).join('');
  body.innerHTML = `
    <nav class="day-tabs" id="day-tabs">${tabs}</nav>
    <div id="active-day"></div>
  `;
  $$('#day-tabs .day-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.dayIdx, 10);
      renderActiveDay(sec, idx);
    });
  });
  renderActiveDay(sec, pickInitialDayIdx(sec));
}

/** Vertical mode: render all days stacked top-to-bottom (the original layout). */
function renderVerticalMode(sec) {
  const body = $('#itinerary-body');
  // Tear down any leftover day maps
  state.dayMaps.forEach(m => m.remove());
  state.dayMaps.clear();
  body.innerHTML = sec.days.map((d, idx) => renderDay(d, idx)).join('');
  sec.days.forEach((d, idx) => initDayMap(d, idx));
  // If today is within the trip, scroll to that day after layout settles
  const initialIdx = pickInitialDayIdx(sec);
  if (initialIdx > 0) {
    setTimeout(() => {
      const el = body.children[initialIdx];
      if (el && el.scrollIntoView) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 100);
  }
}

function renderActiveDay(sec, idx) {
  const day = sec.days[idx];
  if (!day) return;
  state.dayMaps.forEach(m => m.remove());
  state.dayMaps.clear();
  $$('#day-tabs .day-tab').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  const container = $('#active-day');
  if (!container) return;
  container.innerHTML = renderDay(day, idx);
  initDayMap(day, idx);
  const activeBtn = $(`#day-tabs .day-tab[data-day-idx="${idx}"]`);
  if (activeBtn && activeBtn.scrollIntoView) {
    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

/** Short date for tabs: "1/24" */
function fmtDateShort(d) {
  if (!d) return '';
  const date = parseDate(d) || d;
  return `${date.getMonth() + 1}/${date.getDate()}`;
}

function renderDay(day, idx) {
  const stopsHTML = day.stops
    .map((s, i) => renderStop(s, i, day.stops[i + 1] || null))
    .join('');
  return `
    <div class="timeline-day">
      <div class="timeline-day-header">
        <div>
          <div class="day-number-label">Day</div>
          <div class="day-number">${day.dayNumber}</div>
        </div>
        <div>
          <div class="day-date">${fmtDate(day.date)}<span class="day-weekday">${weekdayCN(day.date)}</span></div>
        </div>
        <div class="day-stops-count">${day.stops.length} stops</div>
      </div>
      <div class="day-grid">
        <div class="stops-list">${stopsHTML}</div>
        <div class="day-map" id="day-map-${idx}"></div>
      </div>
    </div>
  `;
}

function renderStop(s, idx, nextStop) {
  const time = s.timeStart ? `${s.timeStart}${s.timeEnd ? '–' + s.timeEnd : ''}` : '';
  const ref = s.fields.ref || '';
  const refDisplay = ref.split(/[:：]/)[0] || '';
  const next = s.fields.next || '';
  const notes = s.fields.notes || '';
  // Directions URL only available when there's a next stop AND we can resolve
  // both endpoints to either a ref'd item or a stop name.
  const dirURL = nextStop ? buildDirectionsURL(s, nextStop) : null;
  const dirBtn = dirURL
    ? `<a class="stop-next-dir" href="${escHTML(dirURL)}" target="_blank" rel="noopener" title="Google Maps 導航 → ${escHTML(nextStop.name)}">→</a>`
    : '';
  return `
    <div>
      <div class="stop-item">
        <div class="stop-marker">${idx + 1}</div>
        <div class="stop-card" data-ref="${escHTML(ref)}">
          ${time ? `<div class="stop-time">${escHTML(time)}</div>` : ''}
          <div class="stop-name">${escHTML(s.name)}${refDisplay ? `<span class="stop-ref-tag">${escHTML(refDisplay)}</span>` : ''}</div>
          ${notes ? `<div class="stop-notes">${escHTML(notes)}</div>` : ''}
        </div>
      </div>
      ${next ? `<div class="stop-next"><span class="stop-next-text">${escHTML(next)}</span>${dirBtn}</div>` : ''}
    </div>
  `;
}

/* =========================================================
   MAPS
   ========================================================= */
function tileLayerForTheme() {
  const dark = document.documentElement.dataset.theme === 'dark';
  const url = dark
    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png';
  return L.tileLayer(url, {
    attribution: '&copy; OSM &copy; CARTO',
    maxZoom: 19,
    subdomains: 'abcd'
  });
}

function parseCoords(s) {
  if (!s) return null;
  const m = String(s).match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);
  if (!m) return null;
  return [parseFloat(m[1]), parseFloat(m[2])];
}

function numberedIcon(n) {
  return L.divIcon({
    className: 'numbered-marker',
    html: String(n),
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });
}

function initOverviewMap() {
  const el = document.getElementById('overview-map');
  if (!el) return;
  const points = collectAllCoords(state.parsed);
  if (!points.length) {
    el.innerHTML = '<div style="padding:1.25rem 1.5rem;color:var(--ink-mute);font-style:italic;font-family:var(--serif-body);">尚無座標可顯示</div>';
    return;
  }
  if (state.overviewMap) state.overviewMap.remove();
  const map = L.map(el, { zoomControl: false, attributionControl: false }).setView(points[0].coord, 11);
  tileLayerForTheme().addTo(map);
  const group = L.featureGroup();
  points.forEach(p => {
    L.marker(p.coord).bindPopup(`<strong>${escHTML(p.name)}</strong>${p.section ? `<div>${escHTML(p.section)}</div>` : ''}`).addTo(group);
  });
  group.addTo(map);
  if (points.length > 1) map.fitBounds(group.getBounds().pad(0.15));
  state.overviewMap = map;
}

function initDayMap(day, idx) {
  const el = document.getElementById('day-map-' + idx);
  if (!el) return;
  const points = [];
  day.stops.forEach((s, i) => {
    const ref = findItemByRef(state.parsed, s.fields.ref);
    if (ref && ref.item) {
      const c = parseCoords(ref.item.fields.coordinates);
      if (c) points.push({ coord: c, name: s.name, idx: i + 1 });
    }
  });
  if (!points.length) {
    el.innerHTML = '<div style="padding:1rem;color:var(--ink-mute);font-style:italic;font-family:var(--serif-body);text-align:center;display:flex;align-items:center;justify-content:center;height:100%;">本日無地圖座標</div>';
    return;
  }
  const map = L.map(el, { zoomControl: true, attributionControl: false }).setView(points[0].coord, 12);
  tileLayerForTheme().addTo(map);
  const group = L.featureGroup();
  points.forEach(p => {
    L.marker(p.coord, { icon: numberedIcon(p.idx) })
      .bindPopup(`<strong>#${p.idx} ${escHTML(p.name)}</strong>`)
      .addTo(group);
  });
  if (points.length > 1) {
    L.polyline(points.map(p => p.coord), { color: 'var(--accent)', weight: 2, opacity: 0.5, dashArray: '4 6' }).addTo(group);
  }
  group.addTo(map);
  if (points.length > 1) map.fitBounds(group.getBounds().pad(0.2));
  state.dayMaps.set(idx, map);
}

function collectAllCoords(parsed) {
  const out = [];
  for (const sec of parsed.sections) {
    if (!sec.items) continue;
    for (const it of sec.items) {
      const c = parseCoords(it.fields.coordinates);
      if (c) out.push({ coord: c, name: it.name, section: sec.name });
    }
  }
  return out;
}

/** Render a flight route map: airport markers + great-circle path. */
/**
 * Render a flight route map with airport markers + great-circle path.
 *
 * Visual style ported from MDJimmyFu/flighty-private:
 *   - Glow effect (wide opacity-0.2 line behind a thin core line)
 *   - Status-coded colors:
 *       active    → orange  (#f59e0b) + animated dashes + live plane marker
 *       scheduled → cyan    (#22d3ee) (default for upcoming flights)
 *       landed    → gray    (#4a5c78)
 *       cancelled → red     (#f43f5e)
 *
 * Returns { update(opts) } so loadFlightStatus() can re-color the arc and
 * drop a plane marker after live data arrives. Without API data the arc
 * defaults to "scheduled" cyan.
 */
const FLIGHT_STATUS_COLORS = {
  active:    { color: '#f59e0b', opacity: 0.90, dashed: false, animated: true  },
  scheduled: { color: '#22d3ee', opacity: 0.65, dashed: true,  animated: false },
  landed:    { color: '#4a5c78', opacity: 0.45, dashed: false, animated: false },
  cancelled: { color: '#f43f5e', opacity: 0.30, dashed: false, animated: false },
  diverted:  { color: '#f59e0b', opacity: 0.65, dashed: true,  animated: false },
};

function initFlightRouteMap(elId, flight) {
  const el = document.getElementById(elId);
  if (!el || !flight.fromAirport || !flight.toAirport) return null;
  const from = [flight.fromAirport.lat, flight.fromAirport.lon];
  const to   = [flight.toAirport.lat,   flight.toAirport.lon];

  const map = L.map(el, { zoomControl: false, attributionControl: false, scrollWheelZoom: false }).setView(from, 3);
  tileLayerForTheme().addTo(map);

  // Airport dots with permanent IATA labels
  const mkAirportMarker = (latlng, code) => {
    const marker = L.circleMarker(latlng, {
      radius: 5,
      fillColor: '#22d3ee',
      color: '#fff',
      weight: 2,
      fillOpacity: 1,
    });
    marker.bindTooltip(code, {
      permanent: true,
      direction: 'top',
      offset: [0, -6],
      className: 'flight-airport-label',
    });
    return marker;
  };
  const fromMarker = mkAirportMarker(from, flight.fromCode);
  const toMarker   = mkAirportMarker(to,   flight.toCode);
  fromMarker.addTo(map);
  toMarker.addTo(map);

  const points = greatCircle(from, to, 80);

  // Mutable layers — replaced on update()
  let glowLayer = null;
  let coreLayer = null;
  let planeLayer = null;

  function drawArc(status) {
    if (glowLayer) { map.removeLayer(glowLayer); glowLayer = null; }
    if (coreLayer) { map.removeLayer(coreLayer); coreLayer = null; }
    const s = FLIGHT_STATUS_COLORS[status] || FLIGHT_STATUS_COLORS.scheduled;
    // Wide glow underneath
    glowLayer = L.polyline(points, {
      color: s.color, weight: 6, opacity: s.opacity * 0.22,
      smoothFactor: 1,
    }).addTo(map);
    // Core line on top
    coreLayer = L.polyline(points, {
      color: s.color, weight: 1.8, opacity: s.opacity,
      dashArray: s.dashed ? '6 4' : null,
      smoothFactor: 1,
      className: s.animated ? 'flight-arc-active' : '',
    }).addTo(map);
  }

  function setLivePosition(latlon, heading) {
    if (planeLayer) { map.removeLayer(planeLayer); planeLayer = null; }
    if (!latlon) return;
    const icon = L.divIcon({
      html: `<div class="flight-plane-icon" style="transform:rotate(${heading || 0}deg)">✈</div>`,
      className: '',
      iconSize: [18, 18],
      iconAnchor: [9, 9],
    });
    planeLayer = L.marker(latlon, { icon, zIndexOffset: 1000 }).addTo(map);
  }

  // Initial render = scheduled (cyan dashed) until live data arrives
  drawArc('scheduled');

  const group = L.featureGroup([fromMarker, toMarker, coreLayer]);
  map.fitBounds(group.getBounds().pad(0.25));
  setTimeout(() => map.invalidateSize(), 80);

  const api = {
    update({ status, livePosition, heading }) {
      if (status) drawArc(status);
      if (status === 'active') setLivePosition(livePosition, heading);
      else setLivePosition(null);
    },
  };
  // Expose so loadFlightStatus() can call back after async fetch
  window._currentFlightMap = api;
  return api;
}

/* =========================================================
   LIVE FLIGHT STATUS
   AeroDataBox (RapidAPI) is preferred — 100/day free, HTTPS, lots of fields.
   AviationStack is the fallback — 100/month free, HTTP-only on free tier.
   Both are configured via window.TRIP_CONFIG; both are optional.
   The FlightAware deep-link button works without any API key.
   ========================================================= */
const STATUS_LABEL_ZH = {
  scheduled: '預定起飛', active: '飛行中', landed: '已抵達',
  cancelled: '已取消', diverted: '改降', incident: '異常',
};

/** AeroDataBox — flights/number/{IATA}/{date} */
async function fetchAeroDataBox(flightNo, date, key) {
  const clean = flightNo.replace(/\s+/g, '').toUpperCase();
  const r = await fetch(
    `https://aerodatabox.p.rapidapi.com/flights/number/${encodeURIComponent(clean)}/${encodeURIComponent(date)}`,
    { headers: { 'X-RapidAPI-Key': key, 'X-RapidAPI-Host': 'aerodatabox.p.rapidapi.com' } }
  );
  if (r.status === 404) return [];
  if (!r.ok) {
    const body = await r.json().catch(() => ({}));
    throw new Error(body.message || `AeroDataBox HTTP ${r.status}`);
  }
  const data = await r.json();
  if (!Array.isArray(data)) {
    if (data && data.message) throw new Error(`AeroDataBox: ${data.message}`);
    return [];
  }
  // Normalize to a common shape
  const adbStatus = s => ({ EnRoute:'active', Departed:'active', Landed:'landed',
                            Cancelled:'cancelled', Diverted:'diverted',
                            Expected:'scheduled' })[s] || 'scheduled';
  return data.map(f => {
    const dep = f.departure || {}, arr = f.arrival || {};
    const live = f.location || null;
    return {
      _source: 'aerodatabox',
      status:   adbStatus(f.status),
      airline:  f.airline?.name || '',
      aircraft: f.aircraft?.model || '',
      depGate:  dep.gate || '',
      depTerm:  dep.terminal || '',
      arrGate:  arr.gate || '',
      arrTerm:  arr.terminal || '',
      depTimeSched: dep.scheduledTimeLocal || dep.scheduledTime?.local || dep.scheduledTimeUtc,
      depTimeAct:   dep.actualTimeLocal    || dep.actualTime?.local    || dep.actualTimeUtc,
      arrTimeSched: arr.scheduledTimeLocal || arr.scheduledTime?.local || arr.scheduledTimeUtc,
      arrTimeAct:   arr.actualTimeLocal    || arr.actualTime?.local    || arr.actualTimeUtc,
      depDelay: dep.delay || null,
      arrDelay: arr.delay || null,
      live: live ? { lat: live.lat, lon: live.lon, heading: f.heading || 0 } : null,
    };
  });
}

/** AviationStack — flights?flight_iata=...&flight_date=... */
async function fetchAviationStack(flightNo, date, key) {
  const protocol = key.startsWith('paid_') ? 'https' : 'http';
  const r = await fetch(
    `${protocol}://api.aviationstack.com/v1/flights?access_key=${encodeURIComponent(key)}&flight_iata=${encodeURIComponent(flightNo)}${date ? `&flight_date=${date}` : ''}`
  );
  if (!r.ok) throw new Error(`AviationStack HTTP ${r.status}`);
  const data = await r.json();
  if (data.error) throw new Error(data.error.message || 'AviationStack error');
  const list = (data.data || []);
  return list.map(f => ({
    _source: 'aviationstack',
    status: (f.flight_status || 'scheduled').toLowerCase(),
    airline: f.airline?.name || '',
    aircraft: f.aircraft?.iata || '',
    depGate: f.departure?.gate || '',
    depTerm: f.departure?.terminal || '',
    arrGate: f.arrival?.gate || '',
    arrTerm: f.arrival?.terminal || '',
    depTimeSched: f.departure?.scheduled,
    depTimeAct:   f.departure?.actual || f.departure?.estimated,
    arrTimeSched: f.arrival?.scheduled,
    arrTimeAct:   f.arrival?.actual || f.arrival?.estimated,
    depDelay: f.departure?.delay || null,
    arrDelay: f.arrival?.delay || null,
    live: (f.live && f.live.latitude) ? { lat: f.live.latitude, lon: f.live.longitude, heading: f.live.direction || 0 } : null,
  }));
}

/**
 * Fetch live status and update the modal status card + flight route map.
 * Tries AeroDataBox first if its key is set, otherwise AviationStack.
 * Skips queries for flights >2 days from today.
 */
async function loadFlightStatus(flight) {
  const card = document.getElementById('flight-status-card');
  if (!card || !flight.flightNo) return;
  const adbKey = getApiKey('aeroDataBoxKey');
  const asKey  = getApiKey('aviationStackKey');
  if (!adbKey && !asKey) return;

  // Date-window guard
  if (flight.departDate) {
    const depD = new Date(flight.departDate);
    const today = new Date(); today.setHours(0,0,0,0);
    const days = Math.abs((depD - today) / 86400000);
    if (days > 2) {
      card.innerHTML = `<div class="status-loading">航班日期超出即時資料範圍（僅查詢 ±2 天內）</div>`;
      return;
    }
  }

  let result = null, err = null, source = null;
  try {
    if (adbKey) {
      const list = await fetchAeroDataBox(flight.flightNo, flight.departDate, adbKey);
      result = list[0] || null;
      source = 'AeroDataBox';
    }
    if (!result && asKey) {
      const list = await fetchAviationStack(flight.flightNo, flight.departDate, asKey);
      result = list[0] || null;
      source = 'AviationStack';
    }
  } catch (e) { err = e; }

  if (err) {
    console.warn('flight status:', err);
    card.innerHTML = `<div class="status-loading">查詢失敗（${escHTML(String(err.message || err))}）</div>`;
    return;
  }
  if (!result) {
    card.innerHTML = `<div class="status-loading">查無航班資料</div>`;
    return;
  }

  // Status pill
  const status = result.status || 'scheduled';
  const cls = ['active','landed','cancelled','scheduled','diverted'].includes(status) ? status : 'scheduled';
  const label = STATUS_LABEL_ZH[status] || status;

  // Times
  const fmt = t => t ? new Date(t).toLocaleString('zh-TW', { hour:'2-digit', minute:'2-digit', month:'numeric', day:'numeric' }) : '—';
  const delayHtml = (n) => (n != null && n > 0) ? `<strong style="color:var(--accent)">+${n}分</strong>` : '';
  const lines = [];
  if (result.depTimeSched || result.depTimeAct) {
    lines.push(`${escHTML(flight.fromCode)} 出發 <strong>${fmt(result.depTimeAct || result.depTimeSched)}</strong> ${delayHtml(result.depDelay)}`);
  }
  if (result.arrTimeSched || result.arrTimeAct) {
    lines.push(`${escHTML(flight.toCode)} 抵達 <strong>${fmt(result.arrTimeAct || result.arrTimeSched)}</strong> ${delayHtml(result.arrDelay)}`);
  }
  const gateInfo = [];
  if (result.depTerm || result.depGate) gateInfo.push(`出發 T${escHTML(result.depTerm || '')} 登機口 ${escHTML(result.depGate || '—')}`);
  if (result.arrTerm || result.arrGate) gateInfo.push(`抵達 T${escHTML(result.arrTerm || '')} 行李 ${escHTML(result.arrGate || '—')}`);
  if (gateInfo.length) lines.push(gateInfo.join(' / '));
  if (result.aircraft) lines.push(`機型 <strong>${escHTML(result.aircraft)}</strong>`);

  card.innerHTML = `
    <span class="status-pill ${cls}">${escHTML(label)}</span>
    <div class="status-detail">${lines.join('<br>')}</div>
    <div style="font-family:var(--mono);font-size:0.65rem;color:var(--ink-mute);letter-spacing:0.06em;text-transform:uppercase;width:100%;text-align:right;">${escHTML(source)}</div>
  `;

  // Tell the route map about the new status (and live position if active)
  if (window._currentFlightMap && window._currentFlightMap.update) {
    window._currentFlightMap.update({
      status,
      livePosition: result.live ? [result.live.lat, result.live.lon] : null,
      heading: result.live ? result.live.heading : 0,
    });
  }
}

/* =========================================================
   IMAGE PATH RESOLUTION
   ========================================================= */
function resolveImage(p) {
  if (!p) return null;
  if (/^https?:\/\//i.test(p)) return p;
  // strip leading ./
  p = p.replace(/^\.\//, '').replace(/^\//, '');
  // Local mode: serve from same origin (Cloudflare Pages, custom domain, etc.)
  if (CONFIG.localMode) return p;
  // GitHub mode: serve from raw.githubusercontent
  return `${RAW_BASE}/${p}`;
}

/* =========================================================
   MODAL
   ========================================================= */
function openItemModal(sectionName, itemName) {
  const sec = state.parsed.sections.find(s => s.name === sectionName);
  if (!sec || !sec.items) return;
  const item = sec.items.find(it => it.name === itemName);
  if (!item) return;
  $('#modal-content').innerHTML = renderItemModalContent(item, sectionName);
  $('#modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  // For flight items, defer map init until the modal is in the DOM.
  const flight = parseFlightInfo(item);
  if (flight && flight.fromAirport && flight.toAirport) {
    // Use rAF + small timeout so Leaflet sees the actual element size.
    setTimeout(() => initFlightRouteMap('flight-route-map', flight), 50);
    // Optionally fetch live status if any API key is configured (localStorage or TRIP_CONFIG).
    if (getApiKey('aeroDataBoxKey') || getApiKey('aviationStackKey')) {
      loadFlightStatus(flight);
    }
  }
  // Update URL
  const u = new URL(location.href);
  u.searchParams.set('item', encodeURIComponent(`${sectionName}:${itemName}`));
  history.replaceState(null, '', u);
}
function closeModal() {
  $('#modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  const u = new URL(location.href);
  u.searchParams.delete('item');
  history.replaceState(null, '', u);
}

const MODAL_FIELD_LABELS = {
  check_in: 'Check-in', check_out: 'Check-out', address: '地址',
  coordinates: '座標', google_maps: 'Google Maps', website: '官方網站',
  booking_url: '訂房 / 預約', booking_ref: '訂位代號', price: '價格',
  price_range: '價位', tag: '標籤', phone: '電話', notes: '備註',
  recommended: '推薦', dietary: '飲食', type: '類型', duration: '所需時間',
  ticket: '票價', valid: '有效期', where_to_buy: '購買地點',
  mode: '交通類型', airline: '航空公司', operator: '營運商',
  depart: '出發', arrive: '抵達', pros: '優點', cons: '缺點',
  ref: '對應項目', next: '下一段',
};
const MODAL_HIDDEN_FIELDS = new Set(['notes', 'tag', 'mode']); // shown elsewhere or as buttons

function renderItemModalContent(item, sectionName) {
  const f = item.fields;
  const flight = parseFlightInfo(item);
  const imgs = (item.images || []).map(resolveImage);
  // For flights with both endpoints known, the hero is a route map (rendered later).
  // Otherwise fall back to the standard image / placeholder hero.
  let hero;
  if (flight && flight.fromAirport && flight.toAirport) {
    hero = `<div class="flight-route-map" id="flight-route-map"></div>`;
  } else if (imgs.length) {
    hero = `<img class="modal-image" src="${escHTML(imgs[0])}" alt="${escHTML(item.name)}" data-fallback-section="${escHTML(sectionName)}" onerror="window.__handleHeroImageError(this)"/>`;
  } else {
    hero = `<div class="modal-image-placeholder">${escHTML(sectionName)}</div>`;
  }

  // Buttons row
  const btns = [];
  const gmapsURL = buildGmapsURL(item);
  if (gmapsURL) btns.push(`<a class="btn-primary" href="${escHTML(gmapsURL)}" target="_blank" rel="noopener">📍 Google Maps 導航</a>`);
  if (f.booking_url) btns.push(`<a class="btn-secondary" href="${escHTML(f.booking_url)}" target="_blank" rel="noopener">🎫 預約 / 訂購</a>`);
  if (f.website) btns.push(`<a class="btn-secondary" href="${escHTML(f.website)}" target="_blank" rel="noopener">🔗 官方網站</a>`);
  if (f.phone) btns.push(`<a class="btn-secondary" href="tel:${escHTML(f.phone)}">☏ 撥打電話</a>`);
  // Flight-specific: deep link to FlightAware for live status (no API key needed).
  // FlightAware uses ICAO callsigns (BR184→EVA184, AY0533→FIN533); convert for the URL only.
  if (flight && flight.flightNo) {
    const icaoCode = flightNoToIcao(flight.flightNo);
    btns.unshift(`<a class="btn-primary" href="https://flightaware.com/live/flight/${escHTML(icaoCode)}" target="_blank" rel="noopener">🛫 即時航班狀態 (${escHTML(flight.flightNo)})</a>`);
  }

  // Live-status placeholder (filled in async if any API key is set)
  const hasFlightApi = getApiKey('aeroDataBoxKey') || getApiKey('aviationStackKey');
  const statusBlock = (flight && flight.flightNo && hasFlightApi)
    ? `<div class="flight-status-card" id="flight-status-card"><div class="status-loading">查詢即時航班狀態中…</div></div>`
    : '';

  // Field rows (skip the ones surfaced as buttons / hidden)
  const skipKeys = new Set(['google_maps', 'booking_url', 'website', ...MODAL_HIDDEN_FIELDS]);
  const fieldRows = Object.entries(f)
    .filter(([k, v]) => v && !skipKeys.has(k))
    .map(([k, v]) => {
      const label = MODAL_FIELD_LABELS[k] || k;
      let val = escHTML(v);
      if (/^https?:\/\//.test(v)) val = `<a href="${escHTML(v)}" target="_blank" rel="noopener">${escHTML(v)}</a>`;
      return `<div class="modal-field-key">${escHTML(label)}</div><div class="modal-field-value">${val}</div>`;
    }).join('');

  const subtitle = buildCardSubtitle(item, sectionName);

  return `
    ${hero}
    <div class="modal-body">
      ${f.tag ? `<div class="modal-tag-row"><span class="modal-tag">${escHTML(f.tag)}</span></div>` : ''}
      <h2 class="modal-title">${escHTML(item.name)}</h2>
      ${subtitle ? `<div class="modal-subtitle">${subtitle}</div>` : ''}
      ${f.notes ? `<div class="card-notes" style="margin-bottom:1.25rem;">${escHTML(f.notes)}</div>` : ''}
      ${statusBlock}
      ${btns.length ? `<div class="modal-actions">${btns.join('')}</div>` : ''}
      ${fieldRows ? `<div class="modal-fields">${fieldRows}</div>` : ''}
      ${item.descriptionHTML ? `<div class="modal-description">${item.descriptionHTML}</div>` : ''}
    </div>
  `;
}

/* =========================================================
   SEARCH
   ========================================================= */
async function buildSearchIndex() {
  const idx = [];
  for (const t of state.tree) {
    for (const v of t.versions) {
      try {
        const md = await loadTripMd(t.trip, v);
        const p = parseTrip(md);
        for (const sec of p.sections) {
          if (!sec.items) continue;
          for (const it of sec.items) {
            const tagged = [it.fields.tag, it.fields.recommended, it.fields.dietary, it.fields.notes, it.description].filter(Boolean).join(' ');
            idx.push({
              trip: t.trip, version: v, tripName: p.fm.trip || t.trip,
              section: sec.name, name: it.name,
              haystack: `${sec.name} ${it.name} ${tagged}`,
              snippet: (it.fields.notes || it.description.slice(0, 120) || it.fields.recommended || ''),
            });
          }
        }
      } catch (e) { console.warn('search-index load failed:', t.trip, v, e); }
    }
  }
  state.searchIndex = idx;
  state.fuse = new Fuse(idx, { keys: ['name', 'haystack'], threshold: 0.4, includeMatches: false, minMatchCharLength: 2 });
}

function openSearch() {
  $('#search-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => $('#search-input').focus(), 50);
  if (!state.fuse) buildSearchIndex();
}
function closeSearch() {
  $('#search-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  $('#search-input').value = '';
  $('#search-results').innerHTML = '<div class="search-empty">輸入關鍵字開始搜尋</div>';
}
function runSearch(q) {
  if (!state.fuse || !q.trim()) {
    $('#search-results').innerHTML = '<div class="search-empty">輸入關鍵字開始搜尋</div>';
    return;
  }
  const hits = state.fuse.search(q).slice(0, 30);
  if (!hits.length) {
    $('#search-results').innerHTML = '<div class="search-empty">沒有結果</div>';
    return;
  }
  $('#search-results').innerHTML = hits.map(h => {
    const i = h.item;
    return `<div class="search-result" data-trip="${escHTML(i.trip)}" data-version="${escHTML(i.version)}" data-section="${escHTML(i.section)}" data-item="${escHTML(i.name)}">
      <div class="search-result-meta">${escHTML(i.tripName)} · ${escHTML(i.version)} · ${escHTML(i.section)}</div>
      <div class="search-result-title">${escHTML(i.name)}</div>
      ${i.snippet ? `<div class="search-result-snippet">${escHTML(i.snippet.slice(0, 120))}</div>` : ''}
    </div>`;
  }).join('');
  $$('.search-result').forEach(el => {
    el.addEventListener('click', () => {
      const { trip, version, section, item } = el.dataset;
      closeSearch();
      goTo({ trip, version, tab: section, item });
    });
  });
}

/* =========================================================
   ROUTING
   ========================================================= */
function readURL() {
  const u = new URL(location.href);
  return {
    trip: u.searchParams.get('trip') || null,
    version: u.searchParams.get('v') || null,
    tab: u.searchParams.get('tab') || null,
    item: u.searchParams.get('item') ? decodeURIComponent(u.searchParams.get('item')) : null,
  };
}
function writeURL() {
  const u = new URL(location.href);
  if (state.currentTrip) u.searchParams.set('trip', state.currentTrip); else u.searchParams.delete('trip');
  if (state.currentVersion) u.searchParams.set('v', state.currentVersion); else u.searchParams.delete('v');
  if (state.currentTab) u.searchParams.set('tab', state.currentTab); else u.searchParams.delete('tab');
  history.replaceState(null, '', u);
}

async function goTo({ trip, version, tab, item }) {
  if (trip && trip !== state.currentTrip) {
    state.currentTrip = trip;
    const node = state.tree.find(t => t.trip === trip);
    state.currentVersion = (version && node && node.versions.includes(version)) ? version
                          : (node ? node.versions[node.versions.length - 1] : null);
    await loadAndRender();
  } else if (version && version !== state.currentVersion) {
    state.currentVersion = version;
    await loadAndRender();
  }
  if (tab) {
    state.currentTab = tab;
    render();
  }
  populateSelectors();
  writeURL();
  if (item) {
    const m = item.match(/^([^:：]+)[:：]\s*(.+)$/);
    if (m) openItemModal(m[1].trim(), m[2].trim());
  }
}

/* =========================================================
   BOOTSTRAP
   ========================================================= */
async function loadAndRender() {
  if (!state.currentTrip || !state.currentVersion) return;
  const root = $('#app');
  root.innerHTML = `<div class="loading-state"><div class="loading-spinner"></div><p>載入 ${escHTML(state.currentTrip)} / ${escHTML(state.currentVersion)} ...</p></div>`;
  try {
    const md = await loadTripMd(state.currentTrip, state.currentVersion);
    state.parsed = parseTrip(md);
    render();
  } catch (e) {
    root.innerHTML = `<div class="error-state"><div class="error-icon">⚠</div><h2>讀取失敗</h2><p>${escHTML(state.currentTrip)} / ${escHTML(state.currentVersion)}</p><code>${escHTML(e.message)}</code></div>`;
  }
}

function populateSelectors() {
  const tripSel = $('#trip-select');
  const verSel = $('#version-select');
  tripSel.innerHTML = state.tree.map(t => `<option value="${escHTML(t.trip)}" ${t.trip === state.currentTrip ? 'selected' : ''}>${escHTML(t.trip)}</option>`).join('');
  const cur = state.tree.find(t => t.trip === state.currentTrip);
  verSel.innerHTML = (cur ? cur.versions : []).map(v => `<option value="${escHTML(v)}" ${v === state.currentVersion ? 'selected' : ''}>${escHTML(v)}</option>`).join('');
}

async function init() {
  // Theme
  const savedTheme = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  setTheme(savedTheme);

  // Tree
  let tree = null;
  try { tree = await loadTree(); } catch(e) { /* fall through */ }

  if (!tree || !tree.length) {
    $('#app').innerHTML = `
      <div class="error-state">
        <div class="error-icon">⚠</div>
        <h2>找不到行程</h2>
        <p>無法從 GitHub 取得行程資料。</p>
        <code>嘗試的 repo：${escHTML(CONFIG.owner)}/${escHTML(CONFIG.repo)}（${escHTML(CONFIG.branch)} 分支 · ${escHTML(CONFIG.tripsDir)}/ 目錄）

如果路徑不對，請編輯 index.html 上方 CONFIG，或在 HTML 中設置：
&lt;script&gt;window.TRIP_CONFIG = { owner: 'me', repo: 'my-trips' };&lt;/script&gt;
（要在主 script 之前）</code>
      </div>`;
    return;
  }
  state.tree = tree;

  // Initial route
  const r = readURL();
  state.currentTrip = (r.trip && tree.find(t => t.trip === r.trip)) ? r.trip : tree[0].trip;
  const node = tree.find(t => t.trip === state.currentTrip);
  state.currentVersion = (r.version && node.versions.includes(r.version)) ? r.version
                        : node.versions[node.versions.length - 1];
  state.currentTab = r.tab || null;

  populateSelectors();
  await loadAndRender();
  if (r.tab) { state.currentTab = r.tab; render(); }
  if (r.item) {
    const m = r.item.match(/^([^:：]+)[:：]\s*(.+)$/);
    if (m) openItemModal(m[1].trim(), m[2].trim());
  }
  writeURL();
}

/* =========================================================
   THEME
   ========================================================= */
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem('theme', t);
  $('#theme-icon-light').style.display = t === 'dark' ? 'none' : 'block';
  $('#theme-icon-dark').style.display  = t === 'dark' ? 'block' : 'none';
  // Re-init maps if open
  if (state.parsed) render();
}

/* =========================================================
   EVENT WIRING
   ========================================================= */
document.addEventListener('click', e => {
  // Tab clicks
  const tabBtn = e.target.closest('.tab-btn');
  if (tabBtn) {
    state.currentTab = tabBtn.dataset.tab;
    render();
    writeURL();
    return;
  }
  // Stop card click → open ref modal
  const stopCard = e.target.closest('.stop-card');
  if (stopCard) {
    const ref = stopCard.dataset.ref;
    const m = ref && ref.match(/^([^:：]+)[:：]\s*(.+)$/);
    if (m) {
      const found = findItemByRef(state.parsed, ref);
      if (found && found.item) openItemModal(m[1].trim(), m[2].trim());
    }
    return;
  }
});

// Modal close
$('#modal-backdrop').addEventListener('click', closeModal);
$('#modal-close').addEventListener('click', closeModal);
$('#search-backdrop').addEventListener('click', closeSearch);

// Selectors
$('#trip-select').addEventListener('change', e => goTo({ trip: e.target.value }));
$('#version-select').addEventListener('change', e => goTo({ version: e.target.value }));

// Theme
$('#theme-btn').addEventListener('click', () => setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'));

// Search
$('#search-btn').addEventListener('click', openSearch);
$('#search-input').addEventListener('input', e => runSearch(e.target.value));

// Settings
$('#settings-btn').addEventListener('click', openSettingsModal);
$('#settings-close').addEventListener('click', closeSettingsModal);
$('#settings-backdrop').addEventListener('click', closeSettingsModal);
$('#settings-save').addEventListener('click', saveSettingsFromModal);
$('#settings-clear').addEventListener('click', clearSettingsFromModal);

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape') {
    if ($('#search-backdrop').classList.contains('open')) closeSearch();
    else if ($('#settings-backdrop').classList.contains('open')) closeSettingsModal();
    else if ($('#modal-backdrop').classList.contains('open')) closeModal();
  }
});

window.addEventListener('popstate', () => {
  const r = readURL();
  goTo({ trip: r.trip, version: r.version, tab: r.tab, item: r.item });
});

/* Kick off */
init();

</script>

</body>
</html>
