<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>旅誌 · Trip Journal</title>

<!-- ==========================================================
     Anti-crawl directives — tells well-behaved bots to stay away.
     This blocks search engines (Google/Bing/Baidu/Yandex/DuckDuckGo)
     AND major AI training crawlers (OpenAI, Anthropic, Google AI,
     Common Crawl, Perplexity, ByteDance, etc.).

     Note: This does NOT prevent malicious scrapers from reading
     the site — that requires server-side auth (Cloudflare Access).
     But it covers >95% of bots that would actually find this site.
========================================================== -->

<!-- Universal: don't index, don't follow links, don't archive, don't show snippets -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate, max-snippet:-1, max-image-preview:none, max-video-preview:-1">

<!-- Search engine specifics -->
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet">
<meta name="slurp" content="noindex, nofollow, noarchive">
<meta name="duckduckbot" content="noindex, nofollow">
<meta name="baiduspider" content="noindex, nofollow, noarchive">
<meta name="yandex" content="noindex, nofollow, noarchive">

<!-- AI training crawlers — opt out of LLM training datasets -->
<meta name="GPTBot" content="noindex, nofollow">
<meta name="ChatGPT-User" content="noindex, nofollow">
<meta name="OAI-SearchBot" content="noindex, nofollow">
<meta name="ClaudeBot" content="noindex, nofollow">
<meta name="anthropic-ai" content="noindex, nofollow">
<meta name="Claude-Web" content="noindex, nofollow">
<meta name="Google-Extended" content="noindex, nofollow">
<meta name="CCBot" content="noindex, nofollow">
<meta name="cohere-ai" content="noindex, nofollow">
<meta name="PerplexityBot" content="noindex, nofollow">
<meta name="Perplexity-User" content="noindex, nofollow">
<meta name="Bytespider" content="noindex, nofollow">
<meta name="Amazonbot" content="noindex, nofollow">
<meta name="Applebot" content="noindex, nofollow">
<meta name="Applebot-Extended" content="noindex, nofollow">
<meta name="FacebookBot" content="noindex, nofollow">
<meta name="meta-externalagent" content="noindex, nofollow">
<meta name="DiffbotSearch" content="noindex, nofollow">

<!-- Don't auto-link via Open Graph / Twitter Card preview crawlers -->
<meta property="og:robots" content="noindex">
<meta name="referrer" content="no-referrer">

<!-- Fonts: editorial / travel journal aesthetic -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

<!-- Markdown / YAML / Map / Search -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --bg: #FAF6EE;
  --bg-soft: #F2EBDD;
  --bg-card: #FFFCF5;
  --ink: #1F3A2D;
  --ink-soft: #4A5C53;
  --ink-mute: #8A958E;
  --line: #D9D0BD;
  --line-soft: #E8DFCB;
  --accent: #C9573A;
  --accent-soft: #E8B5A2;
  --gold: #B58A3C;

  --serif: 'Cormorant Garamond', 'Noto Serif TC', 'Crimson Text', Georgia, serif;
  --serif-body: 'Crimson Text', 'Noto Serif TC', Georgia, serif;
  --sans: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'Courier New', monospace;

  --shadow-sm: 0 1px 2px rgba(31, 58, 45, 0.06);
  --shadow: 0 4px 16px -4px rgba(31, 58, 45, 0.12), 0 1px 3px rgba(31, 58, 45, 0.06);
  --shadow-lg: 0 24px 48px -12px rgba(31, 58, 45, 0.20), 0 4px 12px rgba(31, 58, 45, 0.08);
}
[data-theme="dark"] {
  --bg: #0E1F18;
  --bg-soft: #15281F;
  --bg-card: #1B3026;
  --ink: #E8DFD0;
  --ink-soft: #B7B0A0;
  --ink-mute: #7A8479;
  --line: #2A3F33;
  --line-soft: #1F332A;
  --accent: #E07757;
  --accent-soft: #6B3A2C;
  --gold: #D4A85C;

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
  --shadow: 0 4px 16px -4px rgba(0, 0, 0, 0.5);
  --shadow-lg: 0 24px 48px -12px rgba(0, 0, 0, 0.6);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.65;
  font-size: 16px;
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 0%, rgba(201, 87, 58, 0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(31, 58, 45, 0.05) 0%, transparent 50%);
}
[data-theme="dark"] body {
  background-image:
    radial-gradient(circle at 20% 0%, rgba(224, 119, 87, 0.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(212, 168, 92, 0.04) 0%, transparent 50%);
}

/* ===== TYPOGRAPHY ===== */
h1, h2, h3, h4 { font-family: var(--serif); color: var(--ink); line-height: 1.25; font-weight: 500; }
h1 { font-size: clamp(2rem, 5vw, 3.5rem); letter-spacing: -0.02em; }
h2 { font-size: clamp(1.5rem, 3vw, 2.25rem); letter-spacing: -0.01em; }
h3 { font-size: 1.5rem; }
h4 { font-size: 1.15rem; }

a { color: var(--accent); text-decoration: none; transition: opacity 0.2s; }
a:hover { opacity: 0.7; }

/* ===== HEADER ===== */
header.site-header {
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.site-header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0.85rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-wrap: wrap;
}
.brand {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-style: italic;
  color: var(--ink);
  letter-spacing: 0.02em;
  margin-right: auto;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.brand::before {
  content: "✦";
  color: var(--accent);
  font-size: 0.85rem;
  font-style: normal;
}
.nav-controls {
  display: flex;
  gap: 0.5rem;
  align-items: center;
  flex-wrap: wrap;
}
select, button.nav-btn {
  font-family: var(--sans);
  font-size: 0.875rem;
  padding: 0.5rem 0.85rem;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--ink);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
select:hover, button.nav-btn:hover { border-color: var(--accent); }
select:focus, button.nav-btn:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
button.nav-btn { display: inline-flex; align-items: center; gap: 0.4rem; }

.icon-btn {
  width: 38px;
  height: 38px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--ink);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.icon-btn svg { width: 18px; height: 18px; }

/* ===== MAIN LAYOUT ===== */
main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 2rem 1.5rem 5rem;
}

/* ===== DASHBOARD HERO ===== */
.dashboard {
  margin-bottom: 3rem;
  position: relative;
}
.dashboard-cover {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 2rem;
  background: var(--bg-soft);
  border: 1px solid var(--line);
}
.dashboard-cover img {
  width: 100%;
  height: 320px;
  object-fit: cover;
  display: block;
  filter: saturate(0.92);
}
.dashboard-cover-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 30%, rgba(31, 58, 45, 0.5) 70%, rgba(31, 58, 45, 0.85) 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 2rem 2.5rem;
  color: #FAF6EE;
}
.dashboard-cover-overlay .trip-meta {
  font-family: var(--mono);
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  opacity: 0.85;
}
.dashboard-cover-overlay h1 {
  color: #FAF6EE;
  margin-bottom: 0.5rem;
  font-weight: 500;
}
.dashboard-cover-overlay .summary {
  font-family: var(--serif-body);
  font-size: 1.1rem;
  font-style: italic;
  opacity: 0.9;
  max-width: 600px;
}
.dashboard-cover-overlay .tags {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 0.85rem;
}
.dashboard-cover-overlay .tag-chip {
  padding: 0.2rem 0.7rem;
  background: rgba(255, 255, 255, 0.18);
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 999px;
  font-size: 0.75rem;
  font-family: var(--sans);
}

/* dashboard without cover */
.dashboard-headline {
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--line);
}
.dashboard-headline .trip-meta {
  font-family: var(--mono);
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 0.5rem;
}
.dashboard-headline .summary {
  font-family: var(--serif-body);
  font-size: 1.15rem;
  font-style: italic;
  color: var(--ink-soft);
  margin-top: 0.5rem;
  max-width: 700px;
}
.dashboard-headline .tags {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 0.85rem;
}
.tag-chip {
  padding: 0.2rem 0.7rem;
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 0.75rem;
  color: var(--ink-soft);
  font-family: var(--sans);
}

/* dashboard cards row */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 2fr;
  gap: 1rem;
  margin-bottom: 1rem;
}
@media (max-width: 880px) {
  .dashboard-grid { grid-template-columns: 1fr 1fr; }
  .dashboard-grid > .dash-map { grid-column: 1 / -1; }
}
@media (max-width: 540px) {
  .dashboard-grid { grid-template-columns: 1fr; }
}

.dash-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 1.25rem 1.5rem;
}
.dash-label {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 0.5rem;
}
.dash-value {
  font-family: var(--serif);
  font-size: 2.5rem;
  font-weight: 500;
  color: var(--ink);
  line-height: 1;
}
.dash-value .unit {
  font-size: 1rem;
  color: var(--ink-soft);
  margin-left: 0.25rem;
  font-style: italic;
}
.dash-sub {
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin-top: 0.5rem;
  font-style: italic;
  font-family: var(--serif-body);
}
.pacing-bars {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-top: 0.5rem;
}
.pacing-bar-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.8rem;
}
.pacing-bar-row .pacing-name { width: 60px; color: var(--ink-soft); }
.pacing-bar-row .pacing-track {
  flex: 1;
  height: 6px;
  background: var(--bg-soft);
  border-radius: 3px;
  overflow: hidden;
}
.pacing-bar-row .pacing-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
}
.pacing-bar-row .pacing-pct {
  width: 32px;
  text-align: right;
  color: var(--ink-soft);
  font-family: var(--mono);
}

.dash-map {
  padding: 0;
  overflow: hidden;
  position: relative;
  min-height: 200px;
  /* isolate Leaflet's internal high z-indexes so they can't escape this card */
  z-index: 0;
  isolation: isolate;
}
.dash-map .leaflet-container {
  height: 220px;
  border-radius: 8px;
  background: var(--bg-soft);
}

/* ===== TABS ===== */
.tabs-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--line);
  margin-bottom: 2rem;
  overflow-x: auto;
  scrollbar-width: thin;
}
.tab-btn {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 500;
  padding: 0.85rem 1.25rem;
  background: none;
  border: none;
  color: var(--ink-mute);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 0.02em;
}
.tab-btn:hover { color: var(--ink); }
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-btn .tab-count {
  font-family: var(--mono);
  font-size: 0.7rem;
  margin-left: 0.4rem;
  color: var(--ink-mute);
  background: var(--bg-soft);
  padding: 0.1rem 0.4rem;
  border-radius: 999px;
  vertical-align: middle;
}

/* ===== TAB CONTENT ===== */
.tab-content { animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== ITEM CARDS GRID ===== */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  transition: all 0.25s;
  cursor: pointer;
  display: flex;
  flex-direction: column;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
  border-color: var(--accent-soft);
}
.card-image {
  width: 100%;
  height: 180px;
  background: var(--bg-soft);
  position: relative;
  overflow: hidden;
}
.card-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-image-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-mute);
  font-family: var(--serif);
  font-style: italic;
  font-size: 0.9rem;
}
.card-image-placeholder span {
  position: relative;
  z-index: 1;
}
.card-tag {
  position: absolute;
  top: 0.75rem;
  left: 0.75rem;
  background: var(--bg-card);
  color: var(--accent);
  padding: 0.25rem 0.65rem;
  border-radius: 999px;
  font-size: 0.7rem;
  font-family: var(--sans);
  font-weight: 500;
  letter-spacing: 0.02em;
  border: 1px solid var(--line);
  box-shadow: var(--shadow-sm);
}
.card-body {
  padding: 1.1rem 1.25rem 1.25rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}
.card-title {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 0.15rem;
}
.card-subtitle {
  font-family: var(--serif-body);
  font-style: italic;
  color: var(--ink-soft);
  font-size: 0.92rem;
}
.card-meta {
  display: flex;
  gap: 0.5rem;
  font-size: 0.8rem;
  color: var(--ink-mute);
  margin-top: 0.25rem;
  flex-wrap: wrap;
}
.card-meta-item { display: inline-flex; align-items: center; gap: 0.25rem; }
.card-notes {
  margin-top: 0.6rem;
  padding: 0.55rem 0.75rem;
  background: var(--bg-soft);
  border-left: 2px solid var(--accent);
  font-size: 0.85rem;
  color: var(--ink-soft);
  font-family: var(--serif-body);
  font-style: italic;
  border-radius: 2px;
}

/* ===== TIMELINE (行程) ===== */

/* Toolbar above the day tabs / vertical days — holds the view toggle */
.itinerary-toolbar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  margin-bottom: 0.85rem;
}
.view-toggle {
  display: inline-flex;
  background: var(--bg-soft);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 3px;
  gap: 2px;
}
.view-toggle-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.35rem 0.85rem;
  background: transparent;
  border: 0;
  border-radius: 999px;
  color: var(--ink-mute);
  font-family: var(--sans);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.02em;
}
.view-toggle-btn:hover { color: var(--ink); }
.view-toggle-btn.active {
  background: var(--bg-card);
  color: var(--accent);
  box-shadow: var(--shadow-sm);
}
.view-toggle-btn svg {
  flex-shrink: 0;
  stroke: currentColor;
}

/* Day tabs — horizontal scroller across the top of the itinerary */
.day-tabs {
  display: flex;
  gap: 0.4rem;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 0.25rem 0.25rem 0.65rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--line);
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--accent-soft) transparent;
}
.day-tabs::-webkit-scrollbar { height: 4px; }
.day-tabs::-webkit-scrollbar-thumb { background: var(--accent-soft); border-radius: 2px; }
.day-tabs::-webkit-scrollbar-track { background: transparent; }

.day-tab {
  flex: 0 0 auto;
  min-width: 88px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.15rem;
  padding: 0.55rem 0.85rem;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s;
  font-family: inherit;
  color: var(--ink);
  user-select: none;
}
.day-tab:hover {
  border-color: var(--accent-soft);
  transform: translateY(-1px);
}
.day-tab.active {
  background: var(--accent);
  color: #FAF6EE;
  border-color: var(--accent);
  box-shadow: var(--shadow-sm);
}
.day-tab-num {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  line-height: 1.1;
}
.day-tab-date {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.04em;
  opacity: 0.85;
}
.day-tab.active .day-tab-date { opacity: 1; }
.day-tab-wd {
  margin-left: 0.3rem;
  font-style: italic;
  opacity: 0.75;
}

.timeline-day {
  margin-bottom: 3rem;
}
.timeline-day-header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 1.25rem;
  padding-bottom: 0.65rem;
  border-bottom: 1px solid var(--line);
}
.day-number {
  font-family: var(--serif);
  font-size: 2.5rem;
  font-style: italic;
  color: var(--accent);
  line-height: 1;
}
.day-number-label {
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-mute);
  display: block;
  margin-bottom: 0.2rem;
}
.day-date {
  font-family: var(--serif);
  font-size: 1.4rem;
  color: var(--ink);
}
.day-weekday {
  color: var(--ink-mute);
  font-size: 0.95rem;
  margin-left: 0.5rem;
  font-style: italic;
}
.day-stops-count {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 0.8rem;
  color: var(--ink-mute);
}

.day-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}
@media (max-width: 880px) {
  .day-grid { grid-template-columns: 1fr; }
}

.day-map {
  position: sticky;
  top: 80px;
  height: 400px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--line);
  background: var(--bg-soft);
  /* isolate Leaflet's internal high z-indexes so they can't escape this card */
  z-index: 0;
  isolation: isolate;
}
.day-map .leaflet-container { height: 100%; }
@media (max-width: 880px) {
  .day-map { position: static; height: 280px; }
}

.stops-list {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
}
.stops-list::before {
  content: "";
  position: absolute;
  left: 1rem;
  top: 1.5rem;
  bottom: 1.5rem;
  width: 1px;
  background: var(--line);
}
.stop-item {
  position: relative;
  padding-left: 2.5rem;
  padding-bottom: 1.5rem;
}
.stop-marker {
  position: absolute;
  left: 0.3rem;
  top: 0.25rem;
  width: 1.4rem;
  height: 1.4rem;
  border-radius: 50%;
  background: var(--bg-card);
  border: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  z-index: 2;
}
.stop-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0.85rem 1rem;
  cursor: pointer;
  transition: all 0.2s;
}
.stop-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow);
}
.stop-time {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--accent);
  letter-spacing: 0.04em;
  margin-bottom: 0.2rem;
}
.stop-name {
  font-family: var(--serif);
  font-size: 1.15rem;
  color: var(--ink);
  font-weight: 500;
}
.stop-ref-tag {
  display: inline-block;
  margin-left: 0.5rem;
  font-size: 0.7rem;
  color: var(--ink-mute);
  font-family: var(--sans);
  background: var(--bg-soft);
  padding: 0.1rem 0.45rem;
  border-radius: 999px;
  vertical-align: middle;
}
.stop-notes {
  font-size: 0.85rem;
  color: var(--ink-soft);
  font-style: italic;
  font-family: var(--serif-body);
  margin-top: 0.35rem;
}
.stop-next {
  margin-left: 2.5rem;
  margin-bottom: 0.75rem;
  font-size: 0.78rem;
  color: var(--ink-mute);
  font-family: var(--sans);
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
.stop-next::before {
  content: "↓";
  font-family: var(--mono);
  color: var(--accent);
}
.stop-next-text {
  flex: 1;
  min-width: 0;
}
.stop-next-dir {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 1px solid var(--accent-soft);
  color: var(--accent);
  text-decoration: none;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
  transition: all 0.15s;
}
.stop-next-dir:hover {
  background: var(--accent);
  color: #FAF6EE;
  border-color: var(--accent);
  transform: scale(1.08);
}
.stop-next-dir:active { transform: scale(0.96); }

/* ===== TRANSIT MODE GROUPING ===== */
.transit-section {
  margin-bottom: 2.5rem;
}
.transit-section h3 {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-style: italic;
  color: var(--ink);
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

/* ===== FLIGHT BOARDING-PASS CARD ===== */
.flight-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 1.25rem 1.5rem;
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.flight-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
  border-color: var(--accent-soft);
}
.flight-card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--mono);
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-mute);
  padding-bottom: 0.6rem;
  border-bottom: 1px dashed var(--line);
}
.flight-card-header .flight-airline-name { font-family: var(--sans); letter-spacing: 0.02em; }
.flight-card-header .flight-no {
  color: var(--accent);
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
}
.flight-route-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 0.85rem;
  align-items: center;
}
.flight-endpoint { text-align: center; }
.flight-endpoint .iata {
  font-family: var(--serif);
  font-size: 2.4rem;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.03em;
  line-height: 1;
}
.flight-endpoint .city {
  font-family: var(--serif-body);
  font-style: italic;
  color: var(--ink-soft);
  font-size: 0.85rem;
  margin-top: 0.25rem;
}
.flight-endpoint .time {
  font-family: var(--mono);
  font-size: 0.95rem;
  color: var(--accent);
  margin-top: 0.45rem;
  font-weight: 500;
}
.flight-endpoint .time .next-day-mark {
  font-size: 0.7em;
  color: var(--ink-mute);
  vertical-align: super;
  margin-left: 0.15rem;
}
.flight-path {
  position: relative;
  display: flex;
  align-items: center;
  min-width: 80px;
}
.flight-path .path-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--accent-soft), var(--accent), var(--accent-soft));
  position: relative;
}
.flight-path .path-line::before, .flight-path .path-line::after {
  content: "";
  position: absolute;
  top: 50%;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  transform: translateY(-50%);
}
.flight-path .path-line::before { left: -3px; }
.flight-path .path-line::after  { right: -3px; }
.flight-path .path-icon {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-card);
  padding: 0 0.5rem;
  font-size: 1.05rem;
  color: var(--accent);
  line-height: 1;
}
.flight-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.78rem;
  color: var(--ink-mute);
  font-family: var(--sans);
  padding-top: 0.6rem;
  border-top: 1px dashed var(--line);
  flex-wrap: wrap;
  gap: 0.4rem;
}
.flight-card-footer .flight-tag {
  background: var(--bg-soft);
  color: var(--accent);
  padding: 0.15rem 0.55rem;
  border-radius: 999px;
  font-size: 0.7rem;
  letter-spacing: 0.02em;
}
.flight-card-footer .flight-notes {
  font-style: italic;
  color: var(--ink-soft);
  font-family: var(--serif-body);
  font-size: 0.85rem;
  flex-basis: 100%;
}

/* ===== FLIGHT ROUTE MAP IN MODAL ===== */
.flight-route-map {
  height: 220px;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 1.25rem;
  border: 1px solid var(--line);
  position: relative;
  z-index: 0;
  isolation: isolate;
}
.flight-route-map .leaflet-container { height: 100%; }

/* IATA-code airport label on flight maps */
.flight-airport-label {
  background: var(--bg-card);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 0.15rem 0.4rem;
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  box-shadow: var(--shadow-sm);
  white-space: nowrap;
}

/* Animated marching-ants dash for active (airborne) flight arc */
.flight-arc-active {
  stroke-dasharray: 8 4;
  animation: flight-dash 1.2s linear infinite;
}
@keyframes flight-dash {
  to { stroke-dashoffset: -12; }
}

/* Pulsing plane icon for live position marker */
.flight-plane-icon {
  font-size: 18px;
  color: #f59e0b;
  filter: drop-shadow(0 0 6px #f59e0b);
  animation: flight-pulse 2s ease-in-out infinite;
  display: inline-block;
}
@keyframes flight-pulse {
  0%, 100% { filter: drop-shadow(0 0 4px #f59e0b); }
  50%      { filter: drop-shadow(0 0 10px #f59e0b); }
}

/* Live status block in modal */
.flight-status-card {
  margin: 1rem 0 1.25rem;
  padding: 0.85rem 1rem;
  border-radius: 6px;
  border: 1px solid var(--line);
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  font-size: 0.85rem;
}
.flight-status-card .status-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.2rem 0.65rem;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.flight-status-card .status-pill.scheduled { background: var(--bg-card); color: var(--ink-mute); border: 1px solid var(--line); }
.flight-status-card .status-pill.active    { background: #1F3A2D; color: #FAF6EE; }
.flight-status-card .status-pill.landed    { background: var(--gold); color: #FFF; }
.flight-status-card .status-pill.delayed   { background: var(--accent); color: #FAF6EE; }
.flight-status-card .status-pill.cancelled { background: #555; color: #FFF; }
.flight-status-card .status-loading {
  font-family: var(--serif-body);
  font-style: italic;
  color: var(--ink-mute);
}
.flight-status-card .status-detail {
  flex: 1;
  min-width: 200px;
  color: var(--ink-soft);
}
.flight-status-card .status-detail strong { color: var(--ink); font-family: var(--mono); }

/* ===== FREE-FORM SECTIONS (備案 / 語言) ===== */
.freeform-content {
  font-family: var(--serif-body);
  font-size: 1.05rem;
  color: var(--ink);
  max-width: 720px;
  margin: 0 auto;
}
.freeform-content h3 {
  font-family: var(--serif);
  font-style: italic;
  color: var(--accent);
  margin-top: 2rem;
  margin-bottom: 0.85rem;
}
.freeform-content h4 {
  margin-top: 1.5rem;
  margin-bottom: 0.5rem;
}
.freeform-content ul, .freeform-content ol {
  padding-left: 1.5rem;
  margin-bottom: 1rem;
}
.freeform-content li {
  margin-bottom: 0.35rem;
  line-height: 1.7;
}
.freeform-content p { margin-bottom: 1rem; }
.freeform-content code {
  background: var(--bg-soft);
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 0.9em;
}

/* ===== MODAL ===== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(31, 58, 45, 0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: none;
  align-items: flex-start;
  justify-content: center;
  z-index: 200;
  padding: 2rem 1rem;
  overflow-y: auto;
  animation: backdropIn 0.2s;
}
[data-theme="dark"] .modal-backdrop { background: rgba(0, 0, 0, 0.7); }
.modal-backdrop.open { display: flex; }
@keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg-card);
  border-radius: 10px;
  max-width: 720px;
  width: 100%;
  max-height: calc(100vh - 4rem);
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--line);
  animation: modalIn 0.25s ease-out;
  position: relative;
}
@keyframes modalIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* ===== SETTINGS MODAL ===== */
.settings-modal {
  background: var(--bg-card);
  border-radius: 10px;
  max-width: 520px;
  width: 100%;
  padding: 2rem 2rem 1.5rem;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--line);
  animation: modalIn 0.25s ease-out;
  position: relative;
  margin-top: 2rem;
}
.settings-title {
  font-family: var(--serif);
  font-size: 1.6rem;
  font-weight: 500;
  color: var(--ink);
  margin: 0 0 0.5rem;
  letter-spacing: 0.02em;
}
.settings-hint {
  font-family: var(--serif-body);
  font-size: 0.85rem;
  color: var(--ink-soft);
  font-style: italic;
  margin: 0 0 1.5rem;
  line-height: 1.5;
}
.settings-field { margin-bottom: 1.25rem; }
.settings-field label {
  display: block;
  font-family: var(--sans);
  font-size: 0.85rem;
  color: var(--ink);
  margin-bottom: 0.4rem;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.settings-field input {
  width: 100%;
  padding: 0.55rem 0.75rem;
  border: 1px solid var(--line);
  border-radius: 5px;
  background: var(--bg-soft);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 0.85rem;
  box-sizing: border-box;
}
.settings-field input:focus {
  outline: none;
  border-color: var(--accent-soft);
  background: var(--bg-card);
}
.settings-field small {
  display: block;
  font-family: var(--sans);
  font-size: 0.75rem;
  color: var(--ink-mute);
  margin-top: 0.4rem;
  line-height: 1.4;
}
.settings-field small a {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 2px;
}
.settings-tag {
  display: inline-block;
  background: var(--accent);
  color: #FAF6EE;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 0.1rem 0.45rem;
  border-radius: 999px;
  letter-spacing: 0.06em;
  vertical-align: 1px;
}
.settings-tag-alt {
  display: inline-block;
  background: var(--bg-soft);
  color: var(--ink-mute);
  font-size: 0.65rem;
  font-weight: 700;
  padding: 0.1rem 0.45rem;
  border-radius: 999px;
  border: 1px solid var(--line);
  letter-spacing: 0.06em;
  vertical-align: 1px;
}
.settings-actions {
  display: flex;
  gap: 0.6rem;
  margin-top: 1.25rem;
  padding-top: 1.25rem;
  border-top: 1px dashed var(--line);
}
.settings-status {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--accent);
  margin-top: 0.75rem;
  text-align: right;
  min-height: 1.2em;
}
.modal-image {
  width: 100%;
  height: 280px;
  object-fit: cover;
  background: var(--bg-soft);
  display: block;
}
.modal-image-placeholder {
  width: 100%;
  height: 100px;
  background: var(--bg-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-mute);
  font-style: italic;
  font-family: var(--serif);
}
.modal-body { padding: 1.75rem 2rem 2rem; }
.modal-tag-row { margin-bottom: 0.65rem; }
.modal-tag {
  display: inline-block;
  background: var(--accent-soft);
  color: var(--accent);
  padding: 0.2rem 0.7rem;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 500;
}
[data-theme="dark"] .modal-tag {
  background: var(--accent-soft);
  color: var(--bg-card);
}
.modal-title {
  font-family: var(--serif);
  font-size: 2rem;
  margin-bottom: 0.35rem;
  line-height: 1.15;
}
.modal-subtitle {
  font-family: var(--serif-body);
  font-style: italic;
  color: var(--ink-soft);
  font-size: 1rem;
  margin-bottom: 1.25rem;
}
.modal-fields {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 0.65rem 1.5rem;
  margin-bottom: 1.5rem;
  padding: 1rem 1.25rem;
  background: var(--bg-soft);
  border-radius: 6px;
  font-size: 0.92rem;
}
.modal-field-key {
  font-family: var(--sans);
  font-size: 0.78rem;
  color: var(--ink-mute);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  align-self: center;
}
.modal-field-value {
  color: var(--ink);
  font-family: var(--serif-body);
  word-break: break-word;
}
.modal-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}
.btn-primary, .btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.55rem 1rem;
  border-radius: 6px;
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.2s;
  text-decoration: none;
}
.btn-primary {
  background: var(--accent);
  color: #FAF6EE;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-secondary {
  background: var(--bg-card);
  color: var(--ink);
  border-color: var(--line);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.modal-description {
  font-family: var(--serif-body);
  font-size: 1.05rem;
  line-height: 1.75;
  color: var(--ink);
}
.modal-description p { margin-bottom: 1rem; }
.modal-description ul { padding-left: 1.5rem; margin-bottom: 1rem; }
.modal-description li { margin-bottom: 0.25rem; }
.modal-description img { max-width: 100%; border-radius: 6px; margin: 1rem 0; }
.modal-close {
  position: absolute;
  top: 0.85rem;
  right: 0.85rem;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.95);
  color: var(--ink);
  border: 1px solid var(--line);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
  font-size: 1.2rem;
  transition: all 0.2s;
}
[data-theme="dark"] .modal-close {
  background: rgba(0, 0, 0, 0.5);
  color: var(--ink);
}
.modal-close:hover { background: var(--accent); color: #fff; }

/* ===== SEARCH MODAL ===== */
.search-modal {
  background: var(--bg-card);
  border-radius: 10px;
  max-width: 600px;
  width: 100%;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--line);
}
.search-input-wrap {
  padding: 1rem 1.25rem;
  border-bottom: 1px solid var(--line);
}
.search-input {
  width: 100%;
  font-family: var(--serif);
  font-size: 1.3rem;
  border: none;
  background: transparent;
  color: var(--ink);
  outline: none;
}
.search-input::placeholder { color: var(--ink-mute); font-style: italic; }
.search-results {
  overflow-y: auto;
  flex: 1;
  padding: 0.5rem 0;
}
.search-result {
  padding: 0.85rem 1.25rem;
  cursor: pointer;
  border-bottom: 1px solid var(--line-soft);
}
.search-result:hover { background: var(--bg-soft); }
.search-result-meta {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--ink-mute);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.2rem;
}
.search-result-title {
  font-family: var(--serif);
  font-size: 1.1rem;
  color: var(--ink);
}
.search-result-snippet {
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin-top: 0.25rem;
  font-family: var(--serif-body);
  font-style: italic;
}
.search-empty {
  padding: 2rem;
  text-align: center;
  color: var(--ink-mute);
  font-family: var(--serif-body);
  font-style: italic;
}

/* ===== LOADING / ERROR ===== */
.loading-state, .error-state {
  text-align: center;
  padding: 5rem 2rem;
  color: var(--ink-soft);
}
.loading-state .loading-spinner {
  width: 32px;
  height: 32px;
  border: 2px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error-state .error-icon { font-size: 2rem; margin-bottom: 1rem; }
.error-state h2 { color: var(--ink); margin-bottom: 0.5rem; }
.error-state code {
  display: block;
  margin-top: 1rem;
  padding: 0.85rem 1rem;
  background: var(--bg-soft);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 0.85rem;
  text-align: left;
  white-space: pre-wrap;
  word-break: break-all;
}

/* ===== LEAFLET POPUP TWEAKS ===== */
.leaflet-popup-content-wrapper {
  background: var(--bg-card);
  color: var(--ink);
  border-radius: 6px;
  font-family: var(--sans);
}
.leaflet-popup-content {
  margin: 0.65rem 0.85rem;
  font-size: 0.85rem;
}
.leaflet-popup-tip { background: var(--bg-card); }
.leaflet-popup-content strong {
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 500;
  display: block;
  margin-bottom: 0.2rem;
}

.numbered-marker {
  background: var(--accent);
  color: #FAF6EE;
  font-family: var(--mono);
  font-weight: 700;
  font-size: 0.85rem;

<script>
/* =========================================================
   CONFIG — adjust these for your repo
   ========================================================= */
const CONFIG = (() => {
  // Resolution priority (highest first):
  //   1. window.TRIP_CONFIG manual override
  //   2. Auto-detect from GitHub Pages URL (*.github.io)
  //   3. Auto-detect from build-injected env (Cloudflare Pages)
  //   4. Default to "local mode" — fetch trips/ relative to the page itself,
  //      no GitHub API calls. Works on Cloudflare Pages, *.pages.dev,
  //      custom domains, and even file:// during local dev.
  const manual = window.TRIP_CONFIG || {};
  const host = location.hostname;
  let owner = manual.owner;
  let repo  = manual.repo;

  // (2) GitHub Pages: alice.github.io/myrepo/...
  if (!owner && host.endsWith('.github.io')) {
    owner = host.replace('.github.io', '');
  }
  if (!repo && host.endsWith('.github.io')) {
    const seg = location.pathname.split('/').filter(Boolean);
    repo = seg[0] || (owner ? `${owner}.github.io` : null);
  }

  // If we still don't have owner/repo, switch to local mode — the site
  // will read trips/ from its own deployed files (works on any host).
  const localMode = !owner || !repo;

  return {
    owner: owner || null,
    repo:  repo  || null,
    branch:   manual.branch   || 'main',
    tripsDir: manual.tripsDir || 'trips',
    localMode: manual.localMode !== undefined ? manual.localMode : localMode,
    fallbackToLocal: manual.fallbackToLocal !== false,
  };
})();

const RAW_BASE = CONFIG.owner && CONFIG.repo
  ? `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}`
  : '';
const API_BASE = CONFIG.owner && CONFIG.repo
  ? `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}`
  : '';

/* =========================================================
   STATE
   ========================================================= */
const state = {
  tree: null,           // [{trip: 'slug', versions: ['v1', 'v2']}, ...]
  currentTrip: null,
  currentVersion: null,
  currentTab: null,
  parsed: null,         // parsed md object
  searchIndex: [],      // list of {trip, version, section, name, content}
  fuse: null,
  dayMaps: new Map(),   // dayIndex -> Leaflet map instance
  overviewMap: null,
};

/* =========================================================
   HELPERS
   ========================================================= */
const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);
const escHTML = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slugify = s => String(s).toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]+/g, '-').replace(/^-|-$/g, '');

/**
 * Image error handlers — exposed on window so they can be referenced from
 * `onerror` attributes without having to embed JS string literals containing

 */
window.__handleHeroImageError = function(img) {
  const section = img.dataset.fallbackSection || '';
  const div = document.createElement('div');
  div.className = 'modal-image-placeholder';
  div.textContent = section;
  img.replaceWith(div);
};
window.__handleCardImageError = function(img) {
  const wrap = img.parentElement;
  if (!wrap) return;
  wrap.classList.add('card-image-placeholder');
  img.remove();
  const span = document.createElement('span');
  span.textContent = '圖片載入失敗';
  wrap.appendChild(span);
};

function parseDate(s) {
  if (!s) return null;
  if (s instanceof Date) return s;
  const m = String(s).match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  return new Date(+m[1], +m[2] - 1, +m[3]);
}
function daysBetween(a, b) {
  if (!a || !b) return 0;
  return Math.round((b - a) / 86400000);
}

  if (!d) return '';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

  if (!d) return '';
  return ['週日','週一','週二','週三','週四','週五','週六'][d.getDay()];

 */

 */

  ITM:'大阪国際空港', NGO:'中部国際空港', CTS:'新千歳空港',
  FUK:'福岡空港', OKA:'那覇空港', OSA:'関西空港',
  // Korea
  ICN:'Incheon International Airport', GMP:'Gimpo Airport',
  PUS:'Busan Gimhae Airport', CJU:'Jeju Airport',
  // China

  PVG:'上海浦东国际机场', SHA:'上海虹桥国际机场',
  CAN:'广州白云国际机场', SZX:'深圳宝安国际机场',
  CTU:'成都双流国际机场', HGH:'杭州萧山国际机场',
  XMN:'厦门高崎国际机场',
  // HK / Macau
  HKG:'香港國際機場', MFM:'澳門國際機場',

  HKT:'Phuket Airport', CNX:'Chiang Mai Airport',
  SIN:'Singapore Changi Airport', KUL:'Kuala Lumpur International Airport',

  DEL:'Indira Gandhi International Airport', BOM:'Mumbai Airport',

  // Europe — English
  LHR:'London Heathrow Airport', LGW:'London Gatwick Airport',
  CDG:'Paris Charles de Gaulle Airport', ORY:'Paris Orly Airport',
  FRA:'Frankfurt Airport', MUC:'Munich Airport', BER:'Berlin Brandenburg Airport',
  AMS:'Amsterdam Schiphol Airport',
  MAD:'Madrid Barajas Airport', BCN:'Barcelona El Prat Airport',
  FCO:'Rome Fiumicino Airport', MXP:'Milan Malpensa Airport',
  ZRH:'Zurich Airport', GVA:'Geneva Airport',
  VIE:'Vienna International Airport',
  CPH:'Copenhagen Airport', ARN:'Stockholm Arlanda Airport',
  OSL:'Oslo Gardermoen Airport',
  HEL:'Helsinki-Vantaa Airport', RVN:'Rovaniemi Airport',
  LIS:'Lisbon Airport', DUB:'Dublin Airport',
  // North America
  JFK:'John F. Kennedy International Airport', EWR:'Newark Liberty International Airport',
  LGA:'LaGuardia Airport', BOS:'Boston Logan Airport',
  LAX:'Los Angeles International Airport', SFO:'San Francisco International Airport',
  SEA:'Seattle-Tacoma International Airport', ORD:'Chicago O\u2019Hare Airport',
  DFW:'Dallas Fort Worth Airport',

  // Oceania

  AKL:'Auckland Airport', CHC:'Christchurch Airport',

function airportNavQuery(iata) {
  if (!iata) return null;
  const code = String(iata).toUpperCase();
  return AIRPORT_NAV[code] || `${code} Airport`;
}

/**
 * Pick the best Google-Maps query string for an item, in priority order:
 *
 *   1. `local_name` field (optional) + address — for places where the
 *      Chinese display name doesn't match the local Google Maps index
 *      well.  Examples: 鎌倉大仏 (vs Chinese 鎌倉大佛), Sibelius
 *      Monument (vs Chinese 西貝柳斯紀念碑).
 *
 *   2. Item display name + address — what's written in the markdown.
 *
 *   3. Coordinates — last-resort fallback so navigation still works
 *      when there's no usable name. Note that coordinates make Google
 *      Maps land at a pin without any place name in the title bar,
 *      which is why we prefer names whenever available — it makes the
 *      destination identifiable when shared / opened later.
 */
function pickGmapsQuery(item) {
  if (!item) return null;
  const f = item.fields || {};
  // 1. Optional explicit local-language name.
  if (f.local_name) {
    return f.address ? `${f.local_name} ${f.address}` : f.local_name;
  }
  // 2. Display name + address.
  const parts = [];
  if (item.name) parts.push(item.name);
  if (f.address) parts.push(f.address);
  if (parts.length) return parts.join(' ');
  // 3. Coordinates only when nothing nameable is available.
  if (f.coordinates) {
    const c = parseCoords(f.coordinates);
    if (c) return `${c[0]},${c[1]}`;
  }
  return null;
}

/**
 * Single-place Google Maps URL (used by the modal "Google Maps 導航" button).
 * Same priority as `pickGmapsQuery`, with one extra:
 *   0. `google_maps` field — if the user pasted a real Google Maps share URL,
 *      use it verbatim (preserves the exact place ID and any view settings).
 */
function buildGmapsURL(item) {
  if (!item) return null;
  const f = item.fields || {};
  if (f.google_maps) return f.google_maps;
  const q = pickGmapsQuery(item);
  if (!q) return null;
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
}

/** Resolve a `ref` like "住宿:Hotel X" to the actual item object, or null. */
function resolveRefItem(ref) {
  if (!ref) return null;
  const m = ref.match(/^([^:：]+)[:：](.+)$/);
  if (!m) return null;
  const sec = state.parsed?.sections?.find(s => s.name === m[1].trim());
  if (!sec || !sec.items) return null;
  return sec.items.find(it => it.name === m[2].trim()) || null;
}

/** Map Chinese travel-mode hints in the `next` field to Google travelmode codes. */
function inferTravelMode(nextStr) {
  const s = String(nextStr || '');
  if (/步行|走路/.test(s)) return 'walking';
  if (/騎|自行車|腳踏車|單車|U[\- ]?Bike|YouBike/i.test(s)) return 'bicycling';
  if (/開車|自駕|自行開車|計程車|租車|的士|Uber|Lyft|計程/.test(s)) return 'driving';
  // Any rail / bus / subway hint, including 飛機 (treated as transit since
  // Google Maps Transit covers air for some routes).
  if (/地鐵|捷運|火車|電車|公車|巴士|大眾|新幹線|高鐵|地下鐵|JR|Skyliner|N'?EX|MTR|Metro|Bus|Subway/i.test(s)) return 'transit';

}

/**
 * Pick the Google-Maps query string for a stop, given its role:
 *   - 'origin'      = directions FROM this stop
 *   - 'destination' = directions TO this stop
 *
 * For stops that ref a flight item, picking the right airport is non-trivial.
 * The same flight is often referenced by *two* stops in the same trip:
 *   "抵達成田機場 13:00"  (arrived at NRT — wants ARRIVE airport)
 *   "前往羽田機場 16:00"  (heading to HND for departure — wants DEPART airport)
 * Both stops point to the same flight item.  We can't tell which is which
 * from the ref alone, so we compare the stop's clock time to the flight's
 * scheduled depart/arrive times:
 *   - stop time ≤ depart time              → at DEPART airport
 *   - stop time ≥ arrive time (same-day)   → at ARRIVE airport
 *   - otherwise (mid-flight / no times)    → fall back to role-based default
 */
function pickStopQuery(stop, role) {
  const item = resolveRefItem(stop?.fields?.ref);
  if (item) {
    const flight = parseFlightInfo(item);
    if (flight && flight.fromCode && flight.toCode) {
      const stopTime = stop?.timeStart || '';
      let useDepart = (role === 'destination'); // default: dest=before flight, origin=after
      if (stopTime && flight.departTime && flight.arriveTime) {
        if (stopTime <= flight.departTime) {
          useDepart = true;                           // pre-departure
        } else if (!flight.crossesDate && stopTime >= flight.arriveTime) {
          useDepart = false;                          // post-arrival, same-day flight
        }
        // else: between depart and arrive (or unclear due to cross-date) — keep role default
      }
      const iata = useDepart ? flight.fromCode : flight.toCode;
      return airportNavQuery(iata);
    }
    const q = pickGmapsQuery(item);
    if (q) return q;
  }
  return stop?.name || null;
}

function buildDirectionsURL(fromStop, toStop) {
  if (!fromStop || !toStop) return null;
  const orig = pickStopQuery(fromStop, 'origin');
  const dest = pickStopQuery(toStop,   'destination');
  if (!orig || !dest) return null;
  const mode = inferTravelMode(fromStop.fields?.next);
  const params = new URLSearchParams({
    api: '1',
    origin: orig,
    destination: dest,
    travelmode: mode,
  });
  return `https://www.google.com/maps/dir/?${params.toString()}`;

/**
 * Convert an IATA flight number ("BR184") to its ICAO equivalent ("EVA184")
 * for FlightAware URLs. Falls back to the original IATA code if the airline
 * isn't in the table — FlightAware accepts both, just less reliably.
 */
function flightNoToIcao(flightNo) {
  if (!flightNo) return flightNo;
  const m = flightNo.match(/^([A-Z0-9]{2})(\d{1,4})$/i);
  if (!m) return flightNo;
  const iataAirline = m[1].toUpperCase();
  const digits = m[2];
  const icao = IATA_TO_ICAO_AIRLINE[iataAirline];
  return icao ? `${icao}${digits}` : flightNo;
}

/** Pull the last 3-letter uppercase token in a string (likely IATA code). */
function lastIATA(s) {
  if (!s) return null;
  const matches = [...String(s).matchAll(/\b([A-Z]{3})\b/g)];
  return matches.length ? matches[matches.length - 1][1] : null;
}

/** Pull a flight number like BR184, NH853, JL048, AY0533. */
function extractFlightNumber(s) {
  if (!s) return null;
  const m = String(s).match(/\b([A-Z]{2}\d{2,4})\b/);
  return m ? m[1] : null;
}

/** Parse an HH:MM time and an optional YYYY-MM-DD date out of a string. */
function parseDateTime(s) {
  if (!s) return { date: null, time: null };
  const dm = String(s).match(/(\d{4}-\d{2}-\d{2})/);
  const tm = String(s).match(/(\d{1,2}:\d{2})/);
  return { date: dm ? dm[1] : null, time: tm ? tm[1] : null };
}

/** Extract structured flight info from a transit item.  Returns null if not a flight. */
function parseFlightInfo(item) {
  if (!item || !item.fields || (item.fields.mode || '').toLowerCase() !== 'flight') return null;
  const f = item.fields;
  const fromCode = lastIATA(f.depart);
  const toCode   = lastIATA(f.arrive);
  const flightNo = extractFlightNumber(f.airline) || extractFlightNumber(item.name);
  const dep = parseDateTime(f.depart);
  const arr = parseDateTime(f.arrive);
  const fromAp = lookupAirport(fromCode);
  const toAp   = lookupAirport(toCode);
  return {
    flightNo,
    airline: f.airline || '',
    fromCode, toCode,
    fromAirport: fromAp,
    toAirport:   toAp,
    fromCity: fromAp ? fromAp.city : '',
    toCity:   toAp   ? toAp.city   : '',
    departDate: dep.date,
    departTime: dep.time,
    arriveDate: arr.date,
    arriveTime: arr.time,
    crossesDate: dep.date && arr.date && dep.date !== arr.date,
  };
}

/** Sample N points along the great-circle between two [lat,lon] points. */
function greatCircle(a, b, n = 64) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const lat1 = toRad(a[0]), lon1 = toRad(a[1]);
  const lat2 = toRad(b[0]), lon2 = toRad(b[1]);
  const d = 2 * Math.asin(Math.sqrt(
    Math.sin((lat2 - lat1) / 2) ** 2 +
    Math.cos(lat1) * Math.cos(lat2) * Math.sin((lon2 - lon1) / 2) ** 2
  ));
  if (d === 0) return [a, b];
  const out = [];
  for (let i = 0; i <= n; i++) {
    const f = i / n;
    const A = Math.sin((1 - f) * d) / Math.sin(d);
    const B = Math.sin(f * d) / Math.sin(d);
    const x = A * Math.cos(lat1) * Math.cos(lon1) + B * Math.cos(lat2) * Math.cos(lon2);
    const y = A * Math.cos(lat1) * Math.sin(lon1) + B * Math.cos(lat2) * Math.sin(lon2);
    const z = A * Math.sin(lat1)                  + B * Math.sin(lat2);
    const lat = Math.atan2(z, Math.sqrt(x*x + y*y));
    const lon = Math.atan2(y, x);
    out.push([toDeg(lat), toDeg(lon)]);
  }
  return out;
}
